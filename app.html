<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triady — generator triad i progresji na gryfie</title>
<style>
/* === ui.css === */
:root {
  --bg: #161210;          /* scena */
  --panel: #221b16;       /* drewno korpusu */
  --panel-2: #2c231c;
  --line: #3b2f25;
  --ink: #efe6d8;         /* kość słoniowa */
  --ink-dim: #b3a692;
  --amber: #e8a33c;       /* żar lampy */
  --amber-soft: #e8a33c33;
  --green: #9dc08b;
  --red: #d97862;
  --radius: 10px;
  --mono: ui-monospace, "SF Mono", "Cascadia Mono", Consolas, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
  padding: 24px 20px 80px;
}
.wrap { max-width: 1040px; margin: 0 auto; }

header h1 {
  margin: 0; font-size: 30px; letter-spacing: .12em; text-transform: uppercase;
  font-weight: 800;
}
header h1 .dot { color: var(--amber); }
header p { margin: 4px 0 0; color: var(--ink-dim); max-width: 60ch; }

/* — panel sterowania — */
.controls {
  margin-top: 20px; padding: 14px 16px;
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
  display: flex; flex-wrap: wrap; gap: 14px 22px; align-items: end;
}
.ctrl { display: flex; flex-direction: column; gap: 4px; }
.ctrl label { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-dim); }
select, input[type=number], input[type=text] {
  background: var(--panel-2); color: var(--ink);
  border: 1px solid var(--line); border-radius: 6px;
  padding: 7px 9px; font: inherit;
}
select:focus, input:focus, button:focus-visible { outline: 2px solid var(--amber); outline-offset: 1px; }
input[type=number] { width: 64px; }
.fret-range { display: flex; align-items: center; gap: 6px; }

/* — zakładki — */
.tabs { display: flex; gap: 6px; margin-top: 22px; border-bottom: 1px solid var(--line); }
.tab {
  background: none; border: none; color: var(--ink-dim);
  padding: 10px 16px; font: inherit; font-weight: 600; cursor: pointer;
  border-bottom: 2px solid transparent;
}
.tab.active { color: var(--amber); border-bottom-color: var(--amber); }
.pane { display: none; padding-top: 18px; }
.pane.active { display: block; }

/* — przyciski — */
button.btn {
  background: var(--panel-2); color: var(--ink);
  border: 1px solid var(--line); border-radius: 7px;
  padding: 8px 14px; font: inherit; font-weight: 600; cursor: pointer;
}
button.btn:hover { border-color: var(--amber); }
button.btn.primary { background: var(--amber); border-color: var(--amber); color: #1d1407; }
button.btn.primary:hover { filter: brightness(1.08); }
button.btn:disabled { opacity: .45; cursor: default; }

/* przycisk ▶ — dioda wzmacniacza */
button.play {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--amber); background: transparent; color: var(--amber);
  font-size: 13px; cursor: pointer; flex: none;
  display: inline-flex; align-items: center; justify-content: center;
  transition: background .15s, box-shadow .15s;
}
button.play:hover { background: var(--amber-soft); }
button.play.lit { background: var(--amber); color: #1d1407; box-shadow: 0 0 14px var(--amber); }

/* — karty voicingów — */
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; }
.card {
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 12px; transition: border-color .15s, box-shadow .15s;
}
.card.playing { border-color: var(--amber); box-shadow: 0 0 0 1px var(--amber), 0 0 18px var(--amber-soft); }
.card h3 { margin: 0; font-size: 16px; }
.card .sub { color: var(--ink-dim); font-size: 12px; }
.card .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 6px; }
.card svg { display: block; margin: 8px auto 6px; }
.tabtxt {
  font-family: var(--mono); font-size: 12.5px; white-space: pre;
  background: var(--bg); border: 1px solid var(--line); border-radius: 6px;
  padding: 6px 8px; color: var(--ink); overflow-x: auto;
}
.notes { font-size: 12px; color: var(--ink-dim); margin-top: 6px; }
.notes b { color: var(--ink); font-weight: 600; }

/* — diatonika — */
.degrees { display: grid; grid-template-columns: repeat(auto-fill, minmax(118px, 1fr)); gap: 10px; }
.deg {
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 10px 12px; cursor: pointer; text-align: left; font: inherit; color: var(--ink);
}
.deg:hover { border-color: var(--amber); }
.deg.sel { border-color: var(--amber); background: var(--amber-soft); }
.deg .roman { font-size: 18px; font-weight: 800; color: var(--amber); }
.deg .nm { font-size: 14px; }
.deg .ns { font-size: 11px; color: var(--ink-dim); }
.hint { color: var(--ink-dim); font-size: 13px; margin: 12px 0; }

/* — progresja — */
.progrow { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.progrow input[type=text] { flex: 1 1 260px; font-family: var(--mono); }
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 16px; }
.chip {
  background: var(--panel-2); border: 1px solid var(--line); border-radius: 999px;
  color: var(--ink-dim); padding: 4px 12px; font-size: 12.5px; cursor: pointer;
}
.chip:hover { color: var(--amber); border-color: var(--amber); }
.chip code { font-family: var(--mono); color: var(--ink); }

/* — propozycje „co dalej?” — */
.suggest { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-top: 12px; }
.suggest-label { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-dim); }
.schip {
  display: inline-flex; align-items: stretch; overflow: hidden;
  background: var(--panel-2); border: 1px solid var(--line); border-radius: 999px;
  transition: border-color .15s;
}
.schip:hover { border-color: var(--amber); }
.schip button { background: none; border: none; color: var(--ink); font: inherit; cursor: pointer; padding: 4px 11px; }
.schip .schip-add { font-size: 12.5px; color: var(--ink-dim); }
.schip .schip-add code { font-family: var(--mono); color: var(--ink); }
.schip .schip-add b { color: var(--amber); font-weight: 700; }
.schip .schip-play {
  border-left: 1px solid var(--line); color: var(--amber); font-size: 11px;
  transition: background .15s, color .15s;
}
.schip .schip-play:hover { background: var(--amber-soft); }
.schip .schip-play.lit { background: var(--amber); color: #1d1407; }

.transport {
  display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  margin: 16px 0; padding: 12px 14px;
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
}
.transport .bpm { display: flex; align-items: center; gap: 8px; }
.transport input[type=range] { accent-color: var(--amber); width: 140px; }
.transport .bpmval { font-family: var(--mono); min-width: 64px; }
.transport label.opt { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink-dim); cursor: pointer; }
.transport input[type=checkbox] { accent-color: var(--amber); }

.flow { display: flex; flex-wrap: wrap; gap: 10px; align-items: stretch; }
.flow .arrow { align-self: center; color: var(--ink-dim); font-size: 18px; }
.flow .card { min-width: 185px; flex: 0 1 200px; }
.cost { color: var(--ink-dim); font-size: 13px; margin-top: 10px; }
.error { color: var(--red); margin-top: 10px; }
.fulltab { margin-top: 16px; }
.toast {
  position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
  background: var(--amber); color: #1d1407; font-weight: 700;
  padding: 8px 18px; border-radius: 999px; opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.toast.show { opacity: 1; }

/* — gryf-scena — */
#fb-wrap { margin-top: 16px; }
.fretboard {
  padding: 12px 14px 8px;
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
}
.fretboard svg { display: block; width: 100%; height: auto; }
.fretboard .cap {
  display: flex; justify-content: space-between; gap: 12px;
  color: var(--ink-dim); font-size: 12.5px; margin-top: 6px;
}
.fretboard .cap #fb-cur { color: var(--amber); font-weight: 700; }

/* — gryf jako instrument (zakładka Gryf) — */
.explore-bar { display: flex; flex-wrap: wrap; gap: 10px 16px; align-items: center; margin-bottom: 14px; }
.explore-bar label.opt { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink-dim); cursor: pointer; }
.explore-bar input[type=checkbox] { accent-color: var(--amber); }
#ex-board svg { cursor: pointer; }
.ex-result { margin-top: 14px; }
.ex-card { max-width: 600px; }
.ex-badge {
  display: inline-block; padding: 3px 12px; border-radius: 999px; white-space: nowrap;
  font-size: 12.5px; font-weight: 700;
  background: var(--amber-soft); color: var(--amber); border: 1px solid var(--amber);
}
.ex-badge.borrow { background: none; color: var(--ink-dim); border-color: var(--line); }
.ex-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

/* — Tryb Sceny — */
/* szkło w palecie sceny: cztery filary (przezroczyste tło, blur, krawędź, cień) */
.glass {
  background: rgba(34, 27, 22, 0.55);
  backdrop-filter: blur(18px) saturate(160%);
  -webkit-backdrop-filter: blur(18px) saturate(160%);
  border: 1px solid rgba(232, 163, 60, 0.22);
  border-radius: 14px;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45), inset 0 1.5px 0 rgba(239, 230, 216, 0.10);
}
#stage {
  position: fixed; inset: 0; z-index: 50; display: none;
  flex-direction: column; gap: 8px;
  padding: 16px clamp(16px, 4vw, 44px) 20px;
  background:
    radial-gradient(ellipse at 12% -8%, rgba(232, 163, 60, 0.10) 0%, transparent 55%),
    radial-gradient(ellipse at 88% 108%, rgba(232, 163, 60, 0.07) 0%, transparent 50%),
    var(--bg);
  overflow: hidden;
}
body.stage-on { overflow: hidden; }
body.stage-on #stage { display: flex; }
body.stage-on #stagebtn { display: none; }
/* pływający żar — czysta dekoracja, więc rusza się tylko przy włączonych „efektach" */
#stage::before, #stage::after {
  content: ''; position: absolute; border-radius: 50%; pointer-events: none;
  filter: blur(80px); background: var(--amber); opacity: 0.05;
}
#stage::before { width: 38vw; height: 38vw; left: -10vw; top: -12vw; }
#stage::after  { width: 30vw; height: 30vw; right: -8vw; bottom: -10vw; }
#stage.fx::before { animation: orbFloat 11s ease-in-out infinite alternate; }
#stage.fx::after  { animation: orbFloat 13s ease-in-out infinite alternate-reverse; }
@keyframes orbFloat {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(26px, 18px) scale(1.07); }
}
@keyframes riseIn {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: none; }
}
body.stage-on #stage > * { animation: riseIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) both; }
body.stage-on #stage > *:nth-child(2) { animation-delay: 0.06s; }
body.stage-on #stage > *:nth-child(3) { animation-delay: 0.12s; }
body.stage-on #stage > *:nth-child(4) { animation-delay: 0.18s; }

.stage-top { display: flex; align-items: center; gap: 16px; position: relative; }
.stage-top .brand {
  font-size: 17px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
}
.stage-top .brand .dot { color: var(--amber); }
#stage-prog {
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-family: var(--mono); font-size: 14px; color: var(--ink-dim);
}
.stage-chords {
  position: relative;
  display: flex; align-items: baseline; justify-content: center; flex-wrap: wrap;
  gap: 8px clamp(14px, 3vw, 30px); margin-top: clamp(0px, 1.5vh, 14px);
  text-align: center;
}
#stage-roman {
  font-size: clamp(56px, 11vw, 124px); font-weight: 800; line-height: 0.95;
  color: var(--amber); letter-spacing: 0.02em;
  text-shadow: 0 0 36px rgba(232, 163, 60, 0.35);
}
#stage-name { font-size: clamp(22px, 4vw, 42px); font-weight: 700; color: var(--ink); }
.stage-side { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; align-self: center; }
#stage-next { font-size: clamp(14px, 1.8vw, 19px); color: var(--ink-dim); }
#stage-next b { color: var(--ink); }
#stage-count { font-family: var(--mono); font-size: 13px; color: var(--ink-dim); }
.stage-fb { flex: 1; display: flex; align-items: center; min-height: 0; }
.stage-fb #fb-wrap { width: 100%; max-width: 1500px; margin: 0 auto; }
#stage .fretboard { padding: 18px 20px 12px; }
.stage-dock { display: flex; justify-content: center; }
.stage-dock .glass { padding: 6px 14px; max-width: 100%; }
.stage-dock .transport { margin: 0; padding: 8px 4px; background: none; border: none; justify-content: center; }

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Triady<span class="dot">.</span></h1>
    <p>Zamknięte triady na zestawach strun, diatonika tonacji i progresje z minimalnym
       prowadzeniem głosów — teraz także do posłuchania.</p>
  </header>

  <div class="controls">
    <div class="ctrl"><label for="tuning">Strój</label><select id="tuning"></select></div>
    <div class="ctrl"><label for="key">Tonacja</label><select id="key"></select></div>
    <div class="ctrl"><label for="scale">Skala</label><select id="scale"></select></div>
    <div class="ctrl"><label for="set">Zestaw strun</label>
      <select id="set"></select></div>
    <div class="ctrl"><label for="inv">Przewroty</label>
      <select id="inv">
        <option value="all">wszystkie</option>
        <option value="root">pozycja zasadnicza</option>
        <option value="inv1">I przewrót</option>
        <option value="inv2">II przewrót</option>
      </select></div>
    <div class="ctrl"><label>Progi</label>
      <div class="fret-range">
        <input type="number" id="fmin" min="0" max="20" value="0"> –
        <input type="number" id="fmax" min="0" max="22" value="12">
      </div></div>
  </div>

  <div class="tabs" role="tablist">
    <button class="tab active" data-pane="pane-chord" role="tab">Akord</button>
    <button class="tab" data-pane="pane-dia" role="tab">Diatonika</button>
    <button class="tab" data-pane="pane-prog" role="tab">Progresja</button>
    <button class="tab" data-pane="pane-explore" role="tab">Gryf</button>
  </div>

  <!-- AKORD -->
  <section id="pane-chord" class="pane active">
    <div class="progrow" style="margin-bottom:14px">
      <div class="ctrl"><label for="croot">Pryma</label><select id="croot"></select></div>
      <div class="ctrl"><label for="cqual">Jakość</label>
        <select id="cqual">
          <option value="maj">dur</option><option value="min">moll</option>
          <option value="dim">zmniejszony</option><option value="aug">zwiększony</option>
        </select></div>
    </div>
    <div id="chord-cards" class="cards"></div>
  </section>

  <!-- DIATONIKA -->
  <section id="pane-dia" class="pane">
    <div id="dia-degrees" class="degrees"></div>
    <p class="hint">Kliknij stopień, żeby zobaczyć i usłyszeć jego voicingi.
       Podwójne kliknięcie dopisuje stopień do progresji.</p>
    <div id="dia-cards" class="cards"></div>
  </section>

  <!-- PROGRESJA -->
  <section id="pane-prog" class="pane">
    <div class="progrow">
      <input type="text" id="progtext" value="I-V-vi-IV" spellcheck="false"
             aria-label="Progresja w cyfrach rzymskich">
      <button class="btn primary" id="gen">Generuj</button>
    </div>
    <div class="suggest" id="suggest-row" hidden>
      <span class="suggest-label">Co dalej?</span>
    </div>
    <div class="chips" id="presets"></div>

    <div id="transport-home">
    <div class="transport">
      <button class="btn primary" id="play">▶ Odtwórz</button>
      <button class="btn" id="practice">↻ Ćwicz</button>
      <button class="btn" id="stop" disabled>■ Stop</button>
      <div class="bpm">
        <input type="range" id="bpm" min="40" max="180" value="80" step="2">
        <span class="bpmval" id="bpmval">80 BPM</span>
      </div>
      <label class="opt">rytm <select id="pattern" aria-label="Wzorzec rytmiczny"></select></label>
      <label class="opt"><input type="checkbox" id="reverb" checked> pogłos</label>
      <label class="opt"><input type="checkbox" id="metro" checked> metronom</label>
      <label class="opt"><input type="checkbox" id="countin" checked> count‑in</label>
      <label class="opt"><input type="checkbox" id="fx" checked> efekty</label>
      <button class="btn" id="copy">Kopiuj tab</button>
      <button class="btn" id="share" title="Skopiuj link otwierający dokładnie tę progresję">Kopiuj link</button>
      <button class="btn" id="stagebtn" title="Pełnoekranowy widok do grania i prezentacji">⛶ Scena</button>
    </div>
    </div>

    <div id="fb-home"><div id="fb-wrap"></div></div>

    <div id="prog-out"></div>
  </section>

  <!-- GRYF — klikalny gryf z rozpoznawaniem triad -->
  <section id="pane-explore" class="pane">
    <div class="explore-bar">
      <label class="opt"><input type="checkbox" id="ex-scale" checked> nakładka skali</label>
      <button class="btn" id="ex-play" disabled>▶ Zagraj zaznaczone</button>
      <button class="btn" id="ex-clear" disabled>Wyczyść</button>
    </div>
    <div id="ex-board" class="fretboard"></div>
    <p class="hint" id="ex-hint"></p>
    <div id="ex-result" class="ex-result"></div>
  </section>
</div>
<!-- Tryb Sceny: pełnoekranowy widok do grania i prezentacji.
     Gryf-scena i transport NIE są duplikowane — na wejściu przenosimy
     żywe węzły DOM (#fb-wrap, .transport) do nakładki, na wyjściu wracają
     do kotwic #fb-home / #transport-home. Wszystkie nasłuchy zostają. -->
<div id="stage" aria-hidden="true">
  <div class="stage-top">
    <span class="brand">Triady<span class="dot">.</span></span>
    <span id="stage-prog"></span>
    <button class="btn" id="stage-exit" title="Wyjdź z trybu sceny (Esc)">✕ Wyjdź</button>
  </div>
  <div class="stage-chords">
    <span id="stage-roman">—</span>
    <span id="stage-name"></span>
    <span class="stage-side">
      <span id="stage-next"></span>
      <span id="stage-count"></span>
    </span>
  </div>
  <div class="stage-fb" id="stage-fb"></div>
  <div class="stage-dock"><div class="glass" id="stage-dock"></div></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* === engine.js — czysty, deterministyczny silnik (testowalny w Node i w przeglądarce) === */
(function (root, factory) {
  if (typeof module === 'object' && module.exports) module.exports = factory();
  else root.Engine = factory();
})(typeof self !== 'undefined' ? self : this, function () {
  'use strict';

  /* === notes.js === */
  const LETTERS = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
  const NAT_PC = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };

  const SCALE_STEPS = {
    major:    [0, 2, 4, 5, 7, 9, 11],
    minor:    [0, 2, 3, 5, 7, 8, 10],
    harmonic: [0, 2, 3, 5, 7, 8, 11],
    melodic:  [0, 2, 3, 5, 7, 9, 11],
  };
  const MAJOR_STEPS = SCALE_STEPS.major;

  const SCALE_LABEL = {
    major:    'durowa',
    minor:    'molowa naturalna',
    harmonic: 'molowa harmoniczna',
    melodic:  'molowa melodyczna (wznosząca)',
  };
  function scaleLabel(key) { return SCALE_LABEL[key] || key; }

  const QUALITY_INTERVALS = { maj: [0, 4, 7], min: [0, 3, 7], dim: [0, 3, 6], aug: [0, 4, 8] };
  const QUALITY_SUFFIX = { maj: '', min: 'm', dim: '°', aug: '+' };

  const mod12 = (n) => ((n % 12) + 12) % 12;

  // znormalizuj różnicę półtonów do zakresu -6..+5 (dla doboru znaku chromatycznego)
  function centerDiff(d) { return ((d % 12) + 18) % 12 - 6; }

  function accString(diff) {
    if (diff === 0) return '';
    if (diff === 1) return '♯';
    if (diff === 2) return '𝄪';
    if (diff === -1) return '♭';
    if (diff === -2) return '𝄫';
    return diff > 0 ? '♯'.repeat(diff) : '♭'.repeat(-diff);
  }

  // nazwij klasę wysokości `pc` literą `letter` (speller enharmoniczny)
  function spellPc(pc, letter) {
    const diff = centerDiff(pc - NAT_PC[letter]);
    return letter + accString(diff);
  }

  // "F#", "Bb", "E" → { pc, letter }
  function parseNote(name) {
    // 𝄪/𝄫 — glify podwójnych alteracji ze spellPc muszą się parsować z powrotem
    // (roundtrip parseNote∘spellPc = id; bez tego np. bVI w D♭ = B𝄫 wywraca parser)
    const m = /^([A-Ga-g])((𝄪|[#♯]{1,2})|(𝄫|[b♭]{1,2}))?$/.exec(name.trim());
    if (!m) return null;
    const letter = m[1].toUpperCase();
    let alt = 0;
    if (m[3]) alt = m[3].length;
    if (m[4]) alt = -m[4].length;
    return { pc: mod12(NAT_PC[letter] + alt), letter, alt };
  }

  // litery + nazwy nut skali (kolejne litery od toniki, znak dobrany do pc)
  function spellScale(tonicName, scaleKey) {
    const t = parseNote(tonicName);
    const steps = SCALE_STEPS[scaleKey];
    if (!t || !steps) return null;
    const li = LETTERS.indexOf(t.letter);
    return steps.map((st, i) => {
      const letter = LETTERS[(li + i) % 7];
      const pc = mod12(t.pc + st);
      return { pc, letter, name: spellPc(pc, letter) };
    });
  }

  function qualityFrom(third, fifth) {
    if (third === 4 && fifth === 7) return 'maj';
    if (third === 3 && fifth === 7) return 'min';
    if (third === 3 && fifth === 6) return 'dim';
    if (third === 4 && fifth === 8) return 'aug';
    return null;
  }

  // akord z prymy (nazwa literowa) i jakości — z poprawnym spellingiem tercji/kwinty
  function buildChord(rootName, quality) {
    const r = parseNote(rootName);
    const iv = QUALITY_INTERVALS[quality];
    if (!r || !iv) return null;
    const li = LETTERS.indexOf(r.letter);
    const letters = [r.letter, LETTERS[(li + 2) % 7], LETTERS[(li + 4) % 7]];
    const pcs = iv.map((s) => mod12(r.pc + s));
    const names = pcs.map((pc, i) => spellPc(pc, letters[i]));
    return {
      rootPc: r.pc, rootName: names[0], quality,
      pcs, names, name: names[0] + QUALITY_SUFFIX[quality],
    };
  }

  /* — diatonika: triada na stopniu d = co druga nuta skali; jakość z realnych interwałów — */
  const ROMAN_BASE = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII'];

  function diatonicTriads(tonicName, scaleKey) {
    const sc = spellScale(tonicName, scaleKey);
    if (!sc) return null;
    const t = parseNote(tonicName);
    return sc.map((_, d) => {
      const tones = [sc[d], sc[(d + 2) % 7], sc[(d + 4) % 7]];
      const third = mod12(tones[1].pc - tones[0].pc);
      const fifth = mod12(tones[2].pc - tones[0].pc);
      const quality = qualityFrom(third, fifth);
      const pcs = tones.map((x) => x.pc);
      const names = tones.map((x) => x.name);
      const chord = {
        degree: d + 1, quality,
        rootPc: pcs[0], rootName: names[0],
        pcs, names, name: names[0] + QUALITY_SUFFIX[quality],
      };
      // zapis rzymski spójny z konwencją parsera (alteracja względem bazy durowej)
      chord.roman = canonicalRoman(chord, t.pc);
      return chord;
    });
  }

  /* — parser stopni (cyfry rzymskie), konwencja chromatyczna pop/rock:
       baza = skala DUROWA toniki; wielkość liter = jakość; °/+ = dim/aug;
       prefiks b/# = alteracja prymy (nie zmienia litery stopnia) — */
  const NUMERALS = { i: 0, ii: 1, iii: 2, iv: 3, v: 4, vi: 5, vii: 6 };

  function parseDegree(token, tonicName) {
    const t = parseNote(tonicName);
    const m = /^([b♭]{1,2}|[#♯]{1,2})?(VII|VI|V|IV|III|II|I|vii|vi|v|iv|iii|ii|i)(°|o|dim|\+|aug)?$/.exec(token.trim());
    if (!m || !t) return null;
    const alt = m[1] ? (/[#♯]/.test(m[1]) ? m[1].length : -m[1].length) : 0;
    const numeral = m[2];
    const idx = NUMERALS[numeral.toLowerCase()];
    const isUpper = numeral === numeral.toUpperCase();
    let quality = isUpper ? 'maj' : 'min';
    if (m[3] === '°' || m[3] === 'o' || m[3] === 'dim') quality = 'dim';
    if (m[3] === '+' || m[3] === 'aug') quality = 'aug';
    const pc = mod12(t.pc + MAJOR_STEPS[idx] + alt);
    const letter = LETTERS[(LETTERS.indexOf(t.letter) + idx) % 7];
    const chord = buildChord(spellPc(pc, letter), quality);
    if (!chord) return null;
    chord.roman = token.trim();
    chord.degree = idx + 1;
    return chord;
  }

  function parseProgression(text, tonicName) {
    const tokens = String(text).split(/[\s,|–—-]+/).filter(Boolean);
    if (!tokens.length) return { ok: false, error: 'Pusta progresja.' };
    const chords = [];
    for (const tok of tokens) {
      const ch = parseDegree(tok, tonicName);
      if (!ch) return { ok: false, error: `Nie rozumiem stopnia: „${tok}”.` };
      chords.push(ch);
    }
    return { ok: true, chords };
  }

  /* === suggestion-engine.js — propozycje kolejnych akordów (czysta heurystyka) === */
  // kanoniczny zapis rzymski akordu względem toniki (ta sama konwencja co parser/diatonika)
  function canonicalRoman(chord, tonicPc) {
    const d = chord.degree - 1;
    const alt = centerDiff(chord.rootPc - mod12(tonicPc + MAJOR_STEPS[d]));
    const altStr = alt > 0 ? '#'.repeat(alt) : 'b'.repeat(-alt);
    let core = ROMAN_BASE[d];
    if (chord.quality === 'min' || chord.quality === 'dim') core = core.toLowerCase();
    return altStr + core + (chord.quality === 'dim' ? '°' : chord.quality === 'aug' ? '+' : '');
  }

  // tabele przejść funkcyjnych (wagi ręcznie skalibrowane, konwencja pop/rock)
  const NEXT_WEIGHTS = {
    major: {
      'I':    { 'IV': 5, 'V': 5, 'vi': 4, 'ii': 3, 'iii': 2, 'bVII': 2, 'vii°': 1 },
      'ii':   { 'V': 6, 'IV': 2, 'vii°': 2, 'iii': 1, 'I': 1 },
      'iii':  { 'vi': 4, 'IV': 4, 'ii': 2, 'I': 1 },
      'IV':   { 'V': 5, 'I': 4, 'ii': 2, 'vi': 2, 'iv': 1, 'bVII': 1 },
      'V':    { 'I': 6, 'vi': 4, 'IV': 2, 'ii': 1 },
      'vi':   { 'IV': 5, 'ii': 4, 'V': 3, 'iii': 2, 'I': 2 },
      'vii°': { 'I': 6, 'iii': 2 },
      'bVII': { 'I': 4, 'IV': 3, 'bVI': 2, 'V': 2 },
      'bVI':  { 'bVII': 4, 'V': 3, 'I': 2 },
      'bIII': { 'bVII': 3, 'bVI': 3, 'IV': 2 },
      'iv':   { 'I': 4, 'V': 2, 'bVII': 1 },
    },
    minor: {
      'i':    { 'iv': 5, 'bVII': 4, 'bVI': 4, 'V': 4, 'v': 3, 'bIII': 3, 'ii°': 2, 'bII': 2, 'vii°': 1 },
      'ii°':  { 'V': 6, 'i': 2 },
      'bII':  { 'i': 5, 'V': 3, 'bIII': 2 },
      'bIII': { 'bVII': 4, 'bVI': 3, 'iv': 2, 'i': 1 },
      'iv':   { 'V': 5, 'i': 4, 'bVII': 3, 'bVI': 2 },
      'v':    { 'i': 4, 'bVI': 3, 'iv': 2 },
      'V':    { 'i': 6, 'bVI': 3, 'iv': 1 },
      'bVI':  { 'V': 6, 'bVII': 4, 'iv': 2, 'i': 2 },
      'bVII': { 'i': 4, 'bVI': 3, 'bIII': 2, 'iv': 2 },
      'vii°': { 'i': 6, 'V': 2 },
    },
  };
  const SUGGEST_CANDIDATES = {
    major: ['I', 'ii', 'iii', 'IV', 'V', 'vi', 'vii°', 'bVII', 'bVI', 'bIII', 'iv'],
    minor: ['i', 'ii°', 'bIII', 'iv', 'v', 'V', 'bVI', 'bVII', 'bII'],
  };
  const START_WEIGHTS = {
    major: { 'I': 6, 'vi': 3, 'IV': 2, 'ii': 2 },
    minor: { 'i': 6, 'iv': 2, 'bVI': 2 },
  };
  // korpus popularnych progresji (cykliczne n-gramy, zapis kanoniczny)
  const PROGRESSION_CORPUS = [
    'I-V-vi-IV', 'I-vi-IV-V', 'vi-IV-I-V', 'I-IV-V-I', 'ii-V-I',
    'I-vi-ii-V', 'I-bVII-IV-I', 'I-IV-vi-V', 'I-iii-IV-V', 'IV-V-iii-vi',
    'i-bVII-bVI-V', 'i-bVI-bIII-bVII', 'i-iv-v-i', 'i-iv-V-i', 'i-bVI-bVII-i',
    // mroczne / metalowe: wspinaczka bVI→bVII, oscylacja andaluzyjska, frygijskie bII
    'i-bVI-bVII-V', 'i-bVII-bVI-bVII', 'i-bII', 'i-bvii-bVI-bII',
  ];

  // tryb dur/moll wnioskowany z pierwszego akordu progresji (i → moll)
  function inferMode(chords) {
    if (chords.length && chords[0].degree === 1) {
      return chords[0].quality === 'min' ? 'minor' : 'major';
    }
    return 'major';
  }
  const scaleMode = (sc) => (sc === 'major' ? 'major' : 'minor');

  // bonus za kontynuację znanego wzorca: sufiks progresji (do 3 akordów)
  // dopasowany cyklicznie do korpusu; dłuższy kontekst → większy bonus
  function corpusBonus(romans, candidate) {
    let bonus = 0; const hits = [];
    const maxL = Math.min(3, romans.length);
    for (const pat of PROGRESSION_CORPUS) {
      const seq = pat.split('-');
      let best = 0;
      for (let L = maxL; L >= 1 && !best; L--) {
        const suf = romans.slice(-L);
        for (let p = 0; p < seq.length; p++) {
          let ok = true;
          for (let k = 0; k < L; k++) if (seq[(p + k) % seq.length] !== suf[k]) { ok = false; break; }
          if (ok && seq[(p + L) % seq.length] === candidate) { best = L; break; }
        }
      }
      if (best) { bonus += 1.2 * best; hits.push({ pattern: pat, len: best }); }
    }
    return { bonus, hits };
  }

  // propozycje kolejnego akordu: posortowana lista { roman, chord, score, reasons }
  // czysta i deterministyczna: te same wejścia → ta sama lista.
  // opts.scale (klucz SCALE_STEPS): ranking faworyzuje stopnie diatoniczne tej skali
  // (kandydaci rozszerzani o jej diatonikę); gdy skala kłóci się z trybem progresji
  // (np. skala durowa, a progresja od i), świadomość skali jest wyłączana zamiast
  // karać na ślepo — wtedy działa czysta heurystyka pop/rock.
  function suggestNext(chords, tonicName, opts = {}) {
    const { limit = 3, mode = 'auto', scale = null } = opts;
    const DIA_BONUS = 2, BORROW_PENALTY = 1;
    const t = parseNote(tonicName);
    if (!t || !Array.isArray(chords)) return [];
    let m;
    if (mode === 'minor' || mode === 'major') m = mode;
    else if (chords.length) m = inferMode(chords);
    else m = scale && SCALE_STEPS[scale] ? scaleMode(scale) : 'major';
    const sc = scale && SCALE_STEPS[scale] && scaleMode(scale) === m ? scale : null;
    const dia = sc ? new Set(diatonicTriads(tonicName, sc).map((c) => c.roman)) : null;
    const table = NEXT_WEIGHTS[m];
    const candidates = dia
      ? [...new Set([...SUGGEST_CANDIDATES[m], ...dia])]
      : SUGGEST_CANDIDATES[m];
    const romans = chords.map((c) => canonicalRoman(c, t.pc));
    const last = romans.length ? romans[romans.length - 1] : null;
    const prev2 = romans.length > 1 ? romans[romans.length - 2] : null;

    const scored = [];
    for (const tok of candidates) {
      if (tok === last) continue;                      // bez natychmiastowej repetycji
      let score = 0; const reasons = [];
      if (!last) {
        score = START_WEIGHTS[m][tok] || 0;
        if (score) reasons.push('typowy akord otwierający');
      } else {
        const w = (table[last] || {})[tok] || 0;
        score += w;
        if (w >= 5) reasons.push(`mocne przejście ${last}→${tok}`);
        else if (w >= 3) reasons.push(`częste przejście ${last}→${tok}`);
        const cb = corpusBonus(romans, tok);
        score += cb.bonus;
        if (cb.hits.length) {
          const top = cb.hits.reduce((a, h) => (h.len > a.len ? h : a), cb.hits[0]);
          reasons.push(`kontynuacja wzorca ${top.pattern}`);
        }
        if (prev2 && tok === prev2) score -= 1;        // lekka kara za ping-pong A–B–A
      }
      if (dia) {
        if (dia.has(tok)) { score += DIA_BONUS; reasons.push(`diatoniczny (skala ${SCALE_LABEL[sc]})`); }
        else { score -= BORROW_PENALTY; reasons.push('zapożyczenie spoza skali'); }
      }
      if (score <= 0) continue;
      const chord = parseDegree(tok, tonicName);
      if (!chord) continue;
      scored.push({ roman: tok, chord, score: Math.round(score * 100) / 100, reasons });
    }
    scored.sort((a, b) => b.score - a.score
      || candidates.indexOf(a.roman) - candidates.indexOf(b.roman));
    return scored.slice(0, limit);
  }

  /* === fretboard.js === */
  const TUNINGS = {
    standard: {
      label: 'standardowe (E A D G B e)',
      open:  { 1: 64, 2: 59, 3: 55, 4: 50, 5: 45, 6: 40 },
      names: { 1: 'e', 2: 'B', 3: 'G', 4: 'D', 5: 'A', 6: 'E' },
    },
    dropC: {
      label: 'Drop C (C G C F A d)',
      open:  { 1: 62, 2: 57, 3: 53, 4: 48, 5: 43, 6: 36 },
      names: { 1: 'd', 2: 'A', 3: 'F', 4: 'C', 5: 'G', 6: 'C' },
    },
  };
  const OPEN_MIDI = TUNINGS.standard.open;          // domyślny strój (zgodność wstecz)
  const STRING_SETS = { '321': [3, 2, 1], '432': [4, 3, 2], '543': [5, 4, 3], '654': [6, 5, 4] };
  const STRING_NAMES = TUNINGS.standard.names;

  function fretsForPc(stringNum, pc, minFret, maxFret, openMidi = OPEN_MIDI) {
    const open = openMidi[stringNum];
    const out = [];
    for (let f = Math.max(0, minFret); f <= maxFret; f++) {
      if (mod12(open + f) === pc) out.push(f);
    }
    return out;
  }

  /* === triad-generator.js === */
  const INVERSIONS = { root: [0, 1, 2], inv1: [1, 2, 0], inv2: [2, 0, 1] };
  const INVERSION_NAME = { root: 'pozycja zasadnicza', inv1: 'I przewrót', inv2: 'II przewrót' };

  function voicingsForChord(chord, setKey, opts = {}) {
    const { minFret = 0, maxFret = 15, inversionFilter = 'all', tuning = 'standard' } = opts;
    const set = STRING_SETS[setKey];
    const tun = TUNINGS[tuning];
    if (!set || !chord || !tun) return [];
    const open = tun.open;
    const invs = inversionFilter === 'all' ? Object.keys(INVERSIONS) : [inversionFilter];
    const out = [];
    for (const inv of invs) {
      const order = INVERSIONS[inv];
      const pcsOrd = order.map((i) => chord.pcs[i]);
      const namesOrd = order.map((i) => chord.names[i]);
      const perString = set.map((s, i) => fretsForPc(s, pcsOrd[i], minFret, maxFret, open));
      for (const f0 of perString[0]) for (const f1 of perString[1]) for (const f2 of perString[2]) {
        const midis = [open[set[0]] + f0, open[set[1]] + f1, open[set[2]] + f2];
        if (!(midis[0] < midis[1] && midis[1] < midis[2])) continue;       // głosy rosnące
        if (midis[2] - midis[0] >= 12) continue;                            // pozycja zamknięta
        const frets = [f0, f1, f2];
        out.push({
          inversion: inv, inversionName: INVERSION_NAME[inv],
          stringSet: setKey, strings: set.slice(), tuning,
          frets, midis, noteNames: namesOrd.slice(),
          position: (f0 + f1 + f2) / 3, minFret: Math.min(f0, f1, f2),
        });
      }
    }
    out.sort((a, b) => a.minFret - b.minFret || a.position - b.position);
    return out;
  }

  /* === progression-engine.js — minimal voice leading (DP/Viterbi) === */
  function transitionCost(a, b) {
    let c = 0;
    for (let i = 0; i < 3; i++) c += Math.abs(a.frets[i] - b.frets[i]);
    c += 0.5 * Math.max(0, Math.abs(a.position - b.position) - 3);
    return c;
  }

  function planProgression(chords, setKey, opts = {}) {
    const EPS = 1e-4;
    const layers = chords.map((ch) => voicingsForChord(ch, setKey, opts));
    for (let i = 0; i < layers.length; i++) {
      if (!layers[i].length) return { ok: false, failedIndex: i, chord: chords[i] };
    }
    let cost = layers[0].map((v) => EPS * v.position);
    let back = [layers[0].map(() => -1)];
    for (let i = 1; i < layers.length; i++) {
      const next = []; const bk = [];
      for (let j = 0; j < layers[i].length; j++) {
        let best = Infinity, arg = -1;
        for (let k = 0; k < layers[i - 1].length; k++) {
          const c = cost[k] + transitionCost(layers[i - 1][k], layers[i][j]);
          if (c < best) { best = c; arg = k; }
        }
        next.push(best + EPS * layers[i][j].position);
        bk.push(arg);
      }
      cost = next; back.push(bk);
    }
    let j = 0;
    for (let k = 1; k < cost.length; k++) if (cost[k] < cost[j]) j = k;
    const pick = [];
    for (let i = layers.length - 1; i >= 0; i--) { pick.unshift(layers[i][j]); j = back[i][j]; }
    let total = 0;
    for (let i = 1; i < pick.length; i++) total += transitionCost(pick[i - 1], pick[i]);
    return { ok: true, voicings: pick, totalCost: total };
  }

  /* === audio-schedule.js — czyste funkcje harmonogramu (testowalne bez AudioContext) === */
  function midiToFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }

  // strum: głosy bas→sopran z małym opóźnieniem
  function strumEvents(voicing, opts = {}) {
    const { at = 0, strumGap = 0.04, duration = 1.6 } = opts;
    return voicing.midis.map((m, i) => ({
      time: at + i * strumGap, midi: m, freq: midiToFreq(m), dur: duration, voice: i,
    }));
  }

  // cała progresja: akord co `beatsPerChord` ćwierćnut przy danym BPM;
  // `pattern` wybiera wzorzec rytmiczny (rhythm-patterns.js, domyślnie 'whole'
  // = dawne zachowanie co do sekundy), `humanize` nakłada deterministyczny jitter
  function progressionSchedule(voicings, opts = {}) {
    const { bpm = 80, beatsPerChord = 4, strumGap = 0.04,
            pattern = 'whole', humanize = null } = opts;
    const beat = 60 / bpm;
    const chordDur = beatsPerChord * beat;
    let events = [];
    const chordTimes = [];
    voicings.forEach((v, i) => {
      const at = i * chordDur;
      chordTimes.push(at);
      events.push(...patternEvents(v, { at, bpm, beatsPerChord, strumGap, pattern, chord: i }));
    });
    if (humanize) events = humanizeEvents(events, humanize);
    return { events, chordTimes, beat, chordDur, totalDuration: voicings.length * chordDur };
  }

  // metronom: kliki ćwierćnutowe; akcent na „raz”
  function metronomeEvents(totalBeats, opts = {}) {
    const { bpm = 80, beatsPerBar = 4, at = 0 } = opts;
    const beat = 60 / bpm;
    const out = [];
    for (let i = 0; i < totalBeats; i++) {
      out.push({ time: at + i * beat, accent: i % beatsPerBar === 0 });
    }
    return out;
  }

  /* === rhythm-patterns.js — wzorce rytmiczne i humanizacja (czyste, testowalne) === */
  // Krok wzorca: { beat (ćwierćnuty od startu akordu), type: 'down'|'up'|'voice',
  //               len (długość w ćwierćnutach), vel (0..1), voice? (dla 'voice') }.
  // down = strum bas→sopran, up = sopran→bas (kostka w górę gra ciszej),
  // voice = pojedynczy głos (arpeggio). Wzorzec opisuje JEDEN akord (takt 4/4).
  const PATTERNS = {
    whole:  { label: 'Całe nuty', steps: [{ beat: 0, type: 'down', len: 4, vel: 1 }] },
    rock:   { label: 'Rock (D·DU·UDU)', steps: [
      { beat: 0,   type: 'down', len: 1,   vel: 1 },
      { beat: 1,   type: 'down', len: 0.5, vel: 0.9 },
      { beat: 1.5, type: 'up',   len: 1,   vel: 0.7 },
      { beat: 2.5, type: 'up',   len: 0.5, vel: 0.7 },
      { beat: 3,   type: 'down', len: 0.5, vel: 0.95 },
      { beat: 3.5, type: 'up',   len: 0.5, vel: 0.75 },
    ] },
    ballad: { label: 'Ballada (arpeggio)', steps: [0, 1, 2, 1, 0, 1, 2, 1].map((v, i) => ({
      beat: i * 0.5, type: 'voice', voice: v, len: v === 0 ? 2 : 1.5,
      vel: v === 0 ? 0.95 : (v === 2 ? 0.8 : 0.68),
    })) },
  };

  // Zdarzenia jednego akordu wg wzorca. Każde zdarzenie niesie `voice` (0..2)
  // i `chord` (indeks akordu) — gryf-scena mapuje z nich strunę do poświaty,
  // zamiast zakładać sztywne „3 zdarzenia na akord" (k % 3).
  function patternEvents(voicing, opts = {}) {
    const { at = 0, bpm = 80, beatsPerChord = 4, strumGap = 0.04,
            pattern = 'whole', chord = 0 } = opts;
    const beat = 60 / bpm;
    const chordDur = beatsPerChord * beat;
    const def = PATTERNS[pattern] || PATTERNS.whole;   // nieznany wzorzec → whole
    const ev = [];
    // klamra długości: nuta nie dłuższa niż takt (zgodność wstecz z whole) ani 2.2 s
    const noteDur = (len) => Math.min(len * beat * 0.95, chordDur * 0.95, 2.2);
    const push = (v, t, len, vel) => ev.push({
      time: t, midi: voicing.midis[v], freq: midiToFreq(voicing.midis[v]),
      dur: noteDur(len), vel, voice: v, chord,
    });
    for (const stp of def.steps) {
      if (stp.beat >= beatsPerChord) continue;         // wzorzec nie wystaje poza akord
      const t0 = at + stp.beat * beat;
      if (stp.type === 'voice') push(stp.voice, t0, stp.len, stp.vel);
      else {
        const order = stp.type === 'up' ? [2, 1, 0] : [0, 1, 2];
        order.forEach((v, i) => push(v, t0 + i * strumGap, stp.len, stp.vel));
      }
    }
    return ev;
  }

  // mulberry32 — mały seedowany PRNG: humanizacja jest deterministyczna
  // (ten sam seed → identyczny wynik), więc testowalna co do bajta.
  function mulberry32(seed) {
    let a = seed >>> 0;
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  // Humanizacja: drobny jitter czasu (±timeJitter s) i głośności (±velJitter).
  // Rusza WYŁĄCZNIE zdarzenia nut — siatka akordów (chordTimes) zostaje nietknięta.
  function humanizeEvents(events, opts = {}) {
    const { seed = 1, timeJitter = 0.008, velJitter = 0.12 } = opts;
    const rnd = mulberry32(seed);
    return events.map((e) => {
      const dt = (rnd() * 2 - 1) * timeJitter;
      const dv = 1 + (rnd() * 2 - 1) * velJitter;
      return Object.assign({}, e, {
        time: Math.max(0, e.time + dt),
        vel: Math.max(0.2, Math.min(1.25, (e.vel === undefined ? 1 : e.vel) * dv)),
      });
    });
  }

  /* === fretboard-geometry.js — geometria gryfu (czysta, testowalna bez DOM) === */
  // pozycja drutu progowego f przy menzurze L (równomierna temperacja)
  function wireX(f, L = 1) { return L * (1 - Math.pow(2, -f / 12)); }

  // geometria okna progów [lo..hi] zmapowana na szerokość viewBoxa;
  // dotX przyjmuje też progi ułamkowe (pozycje kropek w trakcie animacji)
  function fretboardGeometry(opts = {}) {
    const {
      lo = 0, hi = 12, width = 1000, height = 236,
      padLeft = 56, padRight = 16, padTop = 30, padBottom = 36,
    } = opts;
    const leftWire = lo <= 1 ? 0 : lo - 1;            // pole progu lo musi być widoczne
    const rightWire = Math.max(hi + 1, leftWire + 5); // margines + minimalna liczba pól
    const x0 = padLeft, x1 = width - padRight;
    const w0 = wireX(leftWire), w1 = wireX(rightWire);
    const wireXpx = (f) => x0 + ((wireX(f) - w0) / (w1 - w0)) * (x1 - x0);
    const stringY = (s) => padTop + ((s - 1) * (height - padTop - padBottom)) / 5;
    const openX = x0 - 16;                            // marker struny pustej przed siodełkiem
    const dotX = (f) => {
      if (f <= 0) return openX;
      if (f < 1) return openX + ((wireXpx(0) + wireXpx(1)) / 2 - openX) * f;
      return (wireXpx(f - 1) + wireXpx(f)) / 2;       // środek pola, spójnie z kartami
    };
    const inlays = [];
    for (let f = Math.max(1, leftWire + 1); f <= rightWire; f++) {
      if (f === 12 || f === 24) inlays.push({ f, x: dotX(f), double: true });
      else if ([3, 5, 7, 9, 15, 17, 19, 21].includes(f)) inlays.push({ f, x: dotX(f), double: false });
    }
    // hitTest — odwrotność dotX/stringY: punkt viewBoxa → (struna, próg) lub null.
    // Czysta funkcja w czystym module: klikalny gryf testuje się bez DOM.
    const hasNut = leftWire === 0;
    const gap = (height - padTop - padBottom) / 5;
    const hitTest = (x, y) => {
      const s = Math.round((y - padTop) / gap) + 1;
      if (s < 1 || s > 6 || Math.abs(y - stringY(s)) > gap * 0.45) return null;
      if (x > x1 + 2) return null;
      if (hasNut && x < wireXpx(0)) {                  // strefa przed siodełkiem = struna pusta
        return x >= openX - 12 ? { string: s, fret: 0 } : null;
      }
      if (x < wireXpx(leftWire)) return null;
      for (let f = leftWire + 1; f <= rightWire; f++) {
        if (x <= wireXpx(f)) return { string: s, fret: f };
      }
      return null;
    };
    return { lo, hi, leftWire, rightWire, width, height, x0, x1, openX,
             hasNut, wireXpx, dotX, stringY, inlays, hitTest };
  }

  /* === anim-timeline.js — czysta oś czasu animacji prowadzenia głosów === */
  // lista ruchów per głos między sąsiednimi akordami planu
  function voiceMoves(voicings) {
    const out = [];
    for (let i = 1; i < voicings.length; i++) {
      for (let v = 0; v < 3; v++) {
        out.push({
          fromChord: i - 1, toChord: i, voice: v, string: voicings[i].strings[v],
          fromFret: voicings[i - 1].frets[v], toFret: voicings[i].frets[v],
          dist: Math.abs(voicings[i].frets[v] - voicings[i - 1].frets[v]),
        });
      }
    }
    return out;
  }

  function easeInOutCubic(u) {
    u = Math.min(1, Math.max(0, u));
    return u < 0.5 ? 4 * u * u * u : 1 - Math.pow(-2 * u + 2, 3) / 2;
  }

  // czas dojazdu kropek: skaluje się z BPM, z podłogą i sufitem czytelności
  function transitionTime(chordDur, opts = {}) {
    const { transFrac = 0.25, transMin = 0.08, transMax = 0.35 } = opts;
    return Math.min(Math.max(transFrac * chordDur, transMin), transMax, chordDur);
  }

  // stan animacji w chwili t (sekundy od startu przebiegu):
  // okno przejścia KOŃCZY się na starcie akordu (kropki dojeżdżają na uderzenie)
  function animState(t, voicings, sched, opts = {}) {
    const { loop = false, instant = false } = opts;
    const n = voicings.length;
    const { chordDur, totalDuration, chordTimes } = sched;
    const T = transitionTime(chordDur, opts);

    let tt = t;
    if (loop) tt = ((t % totalDuration) + totalDuration) % totalDuration;

    const mk = (a, b, inTrans, u) => ({
      chordIndex: a, nextIndex: b, inTransition: inTrans, u,
      dots: [0, 1, 2].map((v) => {
        const fa = voicings[a].frets[v], fb = voicings[b].frets[v];
        const f = inTrans ? fa + (fb - fa) * u : fa;
        return { voice: v, string: voicings[a].strings[v],
                 fromFret: fa, toFret: fb, fret: f, open: !inTrans && fa === 0 };
      }),
    });

    if (tt < 0) return mk(0, 0, false, 0);             // count-in: czekamy na akordzie 0
    const i = Math.min(n - 1, Math.floor(tt / chordDur + 1e-9));
    const hasNext = i + 1 < n || loop;
    const next = i + 1 < n ? i + 1 : 0;
    const nextStart = i + 1 < n ? chordTimes[i + 1] : totalDuration;
    if (hasNext && !instant && tt > nextStart - T && tt < nextStart) {
      return mk(i, next, true, easeInOutCubic((tt - (nextStart - T)) / T));
    }
    return mk(i, i, false, 0);
  }

  /* === triad-recognition.js — rozpoznawanie triad (czyste, testowalne) === */
  // Wejście: MIDI zaznaczonych dźwięków (dowolna oktawa i kolejność).
  // Wyjście: jakość, pryma, przewrót (z basu = najniższego dźwięku), zapis
  // rzymski w tonacji (konwencja parsera: baza durowa + alteracje) i flaga,
  // czy akord jest diatoniczny dla wybranego wariantu skali.
  // Konwencje: (1) triada zwiększona jest symetryczna — za prymę przyjmujemy
  // bas (przewrót zawsze „pozycja zasadnicza"); (2) wybór stopnia:
  // czysty > bemol > krzyżyk (interwał 6 półtonów → bV, spójnie z bemolową
  // konwencją korpusu); (3) litera nuty wynika ze stopnia (alteracja nie
  // zmienia litery) — stąd np. w C-dur zaznaczone A♭/G♯ pisze się A♭ (bVI).
  function recognizeTriad(midis, opts = {}) {
    const { key = 'C', scale = 'major' } = opts;
    if (!Array.isArray(midis) || midis.length !== 3) {
      return { ok: false, reason: 'Potrzebuję dokładnie trzech dźwięków.' };
    }
    const sorted = midis.slice().sort((a, b) => a - b);  // bas → sopran wg wysokości
    const pcs = sorted.map(mod12);
    const set = [...new Set(pcs)];
    if (set.length < 3) {
      return { ok: false, reason: 'Dźwięki się dublują — triada potrzebuje trzech różnych klas wysokości.' };
    }
    // pryma i jakość: dur/moll/dim mają jednoznaczną prymę, aug jest symetryczny
    const matches = [];
    for (const root of set) {
      for (const q of ['maj', 'min', 'dim', 'aug']) {
        const want = QUALITY_INTERVALS[q].map((i) => mod12(root + i));
        if (want.every((pc) => set.includes(pc))) matches.push({ root, q });
      }
    }
    if (!matches.length) {
      return { ok: false, reason: 'To nie jest triada dur / moll / zmniejszona / zwiększona.' };
    }
    const bassPc = pcs[0];
    const m = matches.length === 1 ? matches[0]
      : matches.find((x) => x.root === bassPc) || matches[0];   // aug: pryma = bas
    const t = parseNote(key);
    if (!t) return { ok: false, reason: 'Nieznana tonacja.' };
    // stopień względem toniki: minimalna alteracja, przy remisie bemol
    const ctr = (x) => { const r = mod12(x); return r > 6 ? r - 12 : r; };
    let best = null;
    for (let d = 0; d < 7; d++) {
      const alt = ctr(m.root - t.pc - MAJOR_STEPS[d]);
      const rank = Math.abs(alt) * 2 + (alt > 0 ? 1 : 0);
      if (!best || rank < best.rank) best = { d, rank };
    }
    const letter = LETTERS[(LETTERS.indexOf(t.letter) + best.d) % 7];
    const chord = buildChord(spellPc(m.root, letter), m.q);
    chord.degree = best.d + 1;
    chord.roman = canonicalRoman(chord, t.pc);
    // diatonika wybranego wariantu skali; jej zapis rzymski jest autorytatywny
    const dia = diatonicTriads(key, scale)
      .find((c) => c.rootPc === chord.rootPc && c.quality === chord.quality);
    if (dia) chord.roman = dia.roman;
    // przewrót z basu + pisownia dźwięków bas→sopran zgodna z akordem
    const memberIdx = chord.pcs.indexOf(bassPc);
    const inversion = memberIdx === 0 ? 'root' : memberIdx === 1 ? 'inv1' : 'inv2';
    const noteNames = pcs.map((pc) => chord.names[chord.pcs.indexOf(pc)]);
    return {
      ok: true, chord, quality: m.q, rootPc: chord.rootPc,
      bassPc, inversion, inversionName: INVERSION_NAME[inversion],
      slashName: inversion === 'root' ? chord.name : chord.name + '/' + noteNames[0],
      noteNames, roman: chord.roman, diatonic: !!dia, midis: sorted,
    };
  }

  /* === share-state.js — stan aplikacji ⇄ fragment URL (czyste funkcje) === */
  // Format jak query string, ale we fragmencie: `#k=C&s=major&p=I-V-vi-IV…`.
  // Wartości są percent-encodowane — alterowane stopnie z `#` (np. `#iv°`)
  // nie ucinają fragmentu (RFC 3986: `#` nie może wystąpić wewnątrz fragmentu).
  // Klucze: t strój · k tonacja · s skala · ss zestaw strun · inv przewroty ·
  // f zakres progów "min-max" · p progresja · bpm · st tryb sceny.
  // decode jest pobłażliwy: nieznane/zepsute pary pomija, liczby klamruje,
  // odwrócony zakres progów naprawia — śmieciowy hash nigdy nie wywraca UI.
  const SHARE_INV = ['all', 'root', 'inv1', 'inv2'];
  const clampInt = (x, lo, hi) => Math.min(hi, Math.max(lo, Math.round(Number(x))));

  function encodeShareState(st = {}) {
    const kv = [];
    const put = (k, v) => {
      if (v === undefined || v === null || v === '') return;
      kv.push(k + '=' + encodeURIComponent(String(v)));
    };
    put('t', st.tuning); put('k', st.key); put('s', st.scale);
    put('ss', st.set); put('inv', st.inv);
    if (st.fmin !== undefined || st.fmax !== undefined) {
      const a = clampInt(st.fmin !== undefined ? st.fmin : 0, 0, 22);
      const b = clampInt(st.fmax !== undefined ? st.fmax : 12, 0, 22);
      put('f', Math.min(a, b) + '-' + Math.max(a, b));
    }
    put('p', st.prog);
    if (st.bpm !== undefined) put('bpm', clampInt(st.bpm, 40, 180));
    if (st.pattern !== undefined && PATTERNS[st.pattern]) put('pt', st.pattern);
    if (st.stage) put('st', 1);
    return kv.join('&');                               // stała kolejność = determinizm
  }

  function decodeShareState(str) {
    const out = {};
    if (typeof str !== 'string') return { ok: true, state: out };
    let s = str.trim();
    if (s.charAt(0) === '#') s = s.slice(1);
    if (!s) return { ok: true, state: out };
    for (const part of s.split('&')) {
      const eq = part.indexOf('=');
      if (eq <= 0 || eq === part.length - 1) continue;
      const k = part.slice(0, eq);
      let v;
      try { v = decodeURIComponent(part.slice(eq + 1)); } catch (e) { continue; }
      if (k === 't') { if (TUNINGS[v]) out.tuning = v; }
      else if (k === 'k') { if (parseNote(v)) out.key = v; }
      else if (k === 's') { if (SCALE_STEPS[v]) out.scale = v; }
      else if (k === 'ss') { if (STRING_SETS[v]) out.set = v; }
      else if (k === 'inv') { if (SHARE_INV.indexOf(v) >= 0) out.inv = v; }
      else if (k === 'f') {
        const m = /^(\d{1,2})-(\d{1,2})$/.exec(v);
        if (m) {
          const a = clampInt(m[1], 0, 22), b = clampInt(m[2], 0, 22);
          out.fmin = Math.min(a, b); out.fmax = Math.max(a, b);
        }
      }
      else if (k === 'p') { const t = v.trim().slice(0, 160); if (t) out.prog = t; }
      else if (k === 'bpm') { const n = Number(v); if (Number.isFinite(n)) out.bpm = clampInt(n, 40, 180); }
      else if (k === 'pt') { if (PATTERNS[v]) out.pattern = v; }
      else if (k === 'st') { out.stage = v === '1' || v === 'true'; }
    }
    return { ok: true, state: out };
  }

  /* === presety === */
  const PRESETS = [
    { name: 'Pop',           text: 'I-V-vi-IV' },
    { name: 'Andaluzyjska',  text: 'i-bVII-bVI-V' },
    { name: 'Jazz ii-V-I',   text: 'ii-V-I' },
    { name: 'Lata 50.',      text: 'I-vi-IV-V' },
    { name: 'Rock',          text: 'I-bVII-IV-I' },
    { name: 'Metal',         text: 'i-bVI-bVII' },
    { name: 'Frygijska',     text: 'i-bvii-bVI-bII' },
  ];

  return {
    LETTERS, NAT_PC, SCALE_STEPS, SCALE_LABEL, scaleLabel,
    QUALITY_INTERVALS, QUALITY_SUFFIX, OPEN_MIDI, STRING_SETS, STRING_NAMES, TUNINGS,
    INVERSIONS, INVERSION_NAME, PRESETS,
    mod12, spellPc, parseNote, spellScale, qualityFrom, buildChord,
    diatonicTriads, parseDegree, parseProgression, canonicalRoman, suggestNext,
    fretsForPc, voicingsForChord, transitionCost, planProgression, recognizeTriad,
    midiToFreq, strumEvents, progressionSchedule, metronomeEvents,
    PATTERNS, patternEvents, humanizeEvents,
    wireX, fretboardGeometry, voiceMoves, easeInOutCubic, transitionTime, animState,
    encodeShareState, decodeShareState,
  };
});

/* === audio.js — Web Audio: syntezowany „pluck” (Karplus-Strong) + metronom === */
const Audio = (() => {
  let ctx = null, master = null;
  let verb = null, wet = null, wantVerb = true;        // pogłos: convolver + regulacja „wet"
  const PAN = [-0.22, 0, 0.22];                        // bas lekko w lewo, sopran w prawo
  const cache = new Map();           // freq(zaokr.) -> AudioBuffer
  let live = [];                     // aktywne źródła
  let timers = [];                   // timeouty UI/pętli
  let playing = false;

  function ensure() {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      master = ctx.createGain();
      master.gain.value = 0.8;
      master.connect(ctx.destination);
      ensureVerb();
    }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  /* Pogłos bez sampli: impuls = stereo szum gasnący wykładniczo (ogon ~1.6 s),
     lekko wygładzony (ciemniejszy ogon brzmi jak pomieszczenie, nie jak syk).
     Nuty wysyłane są do convolvera ZAWSZE; ilość pogłosu reguluje gain „wet",
     więc włącz/wyłącz działa natychmiast, także w trakcie grania. */
  function ensureVerb() {
    const sr = ctx.sampleRate, len = Math.floor(sr * 1.6);
    const buf = ctx.createBuffer(2, len, sr);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      let lp = 0;
      for (let i = 0; i < len; i++) {
        const n = (Math.random() * 2 - 1) * Math.exp(-(i / sr) / 0.5);
        lp = 0.7 * lp + 0.3 * n;
        d[i] = lp;
      }
    }
    verb = ctx.createConvolver();
    verb.buffer = buf;
    wet = ctx.createGain();
    wet.gain.value = wantVerb ? 0.25 : 0;
    verb.connect(wet); wet.connect(master);
  }

  // przełącznik pogłosu; przed pierwszym dźwiękiem tylko zapamiętuje preferencję
  function setReverb(on) {
    wantVerb = !!on;
    if (ctx && wet) wet.gain.value = wantVerb ? 0.25 : 0;
  }

  /* Karplus-Strong renderowany do bufora: pętla szumu z filtrem uśredniającym */
  function pluckBuffer(freq, dur = 2.0) {
    const key = Math.round(freq * 10);
    if (cache.has(key)) return cache.get(key);
    const sr = ctx.sampleRate;
    const N = Math.max(2, Math.round(sr / freq));
    const len = Math.floor(sr * dur);
    const buf = ctx.createBuffer(1, len, sr);
    const out = buf.getChannelData(0);
    const ring = new Float32Array(N);
    // miękkie szarpnięcie: szum wstępnie wygładzony
    let prev = 0;
    for (let i = 0; i < N; i++) {
      const n = Math.random() * 2 - 1;
      ring[i] = 0.5 * (n + prev); prev = n;
    }
    // tłumienie dobrane tak, by niskie i wysokie nuty wybrzmiewały podobnie
    const decay = Math.pow(0.001, 1 / (freq * 2.6));
    let p = 0;
    for (let i = 0; i < len; i++) {
      out[i] = ring[p];
      const nx = (p + 1) % N;
      ring[p] = decay * 0.5 * (ring[p] + ring[nx]);
      p = nx;
    }
    cache.set(key, buf);
    return buf;
  }

  function note(freq, when, dur, gain = 0.5, pan = 0) {
    const src = ctx.createBufferSource();
    src.buffer = pluckBuffer(freq, Math.max(dur, 1.2));
    const g = ctx.createGain();
    g.gain.setValueAtTime(gain, when);
    g.gain.setTargetAtTime(0, when + dur, 0.06);
    src.connect(g);
    let tail = g;
    if (pan && ctx.createStereoPanner) {               // feature detect (stare WebKity)
      const p = ctx.createStereoPanner();
      p.pan.value = pan;
      g.connect(p); tail = p;
    }
    tail.connect(master);
    if (verb) tail.connect(verb);                      // send do pogłosu (klik metronomu nie idzie tędy)
    src.start(when); src.stop(when + dur + 0.4);
    live.push(src);
  }

  function click(when, accent) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'square';
    o.frequency.value = accent ? 1760 : 1175;
    g.gain.setValueAtTime(accent ? 0.22 : 0.13, when);
    g.gain.exponentialRampToValueAtTime(0.0001, when + 0.04);
    o.connect(g); g.connect(master);
    o.start(when); o.stop(when + 0.06);
    live.push(o);
  }

  function later(fn, atSec) {
    timers.push(setTimeout(fn, Math.max(0, (atSec - ctx.currentTime) * 1000)));
  }

  function stop() {
    playing = false;
    timers.forEach(clearTimeout); timers = [];
    live.forEach(s => { try { s.stop(); } catch (_) {} }); live = [];
    if (onStop) onStop();
  }

  let onStop = null;

  function playVoicing(voicing, doneCb) {
    ensure();
    const t0 = ctx.currentTime + 0.03;
    for (const e of Engine.strumEvents(voicing, { at: t0, strumGap: 0.045, duration: 1.6 }))
      note(e.freq, e.time, e.dur, 0.5, PAN[e.voice] || 0);
    if (doneCb) later(doneCb, t0 + 1.7);
  }

  // pojedynczy dźwięk (klik na gryfie-instrumencie)
  function playNote(midi, vel = 0.5) {
    ensure();
    note(Engine.midiToFreq(midi), ctx.currentTime + 0.02, 1.3, vel);
  }

  /* Jedno przejście progresji; zwraca czas końca.
     `passNo` przesuwa seed humanizacji — każde okrążenie pętli ćwiczenia
     „oddycha" odrobinę inaczej, ale całość pozostaje deterministyczna per seed. */
  function schedulePass(voicings, t0, opts, hooks, passNo = 0) {
    const humanize = opts.humanizeSeed === undefined ? null
      : { seed: (opts.humanizeSeed + passNo * 9973) >>> 0 };
    const sched = Engine.progressionSchedule(voicings, {
      bpm: opts.bpm, beatsPerChord: opts.beatsPerChord,
      pattern: opts.pattern, humanize,
    });
    for (const e of sched.events)
      note(e.freq, t0 + e.time, e.dur, 0.5 * (e.vel === undefined ? 1 : e.vel), PAN[e.voice] || 0);
    if (opts.metronome) {
      const beats = voicings.length * opts.beatsPerChord;
      for (const m of Engine.metronomeEvents(beats, { bpm: opts.bpm, beatsPerBar: opts.beatsPerChord, at: 0 }))
        click(t0 + m.time, m.accent);
    }
    sched.chordTimes.forEach((ct, i) => later(() => hooks.onChord(i), t0 + ct));
    return t0 + sched.totalDuration;
  }

  function playProgression(voicings, opts, hooks) {
    ensure();
    playing = true;
    onStop = hooks.onEnd;
    let t0 = ctx.currentTime + 0.06;
    let passNo = 0;

    if (opts.countIn) {
      const beat = 60 / opts.bpm;
      for (let i = 0; i < opts.beatsPerChord; i++) click(t0 + i * beat, i === 0);
      later(() => hooks.onCount && hooks.onCount(), t0);
      t0 += opts.beatsPerChord * beat;
    }

    const pass = () => {
      if (!playing) return;
      if (hooks.onStart) hooks.onStart(t0);            // punkt odniesienia dla animacji (zegar audio)
      const end = schedulePass(voicings, t0, opts, hooks, passNo++);
      if (opts.loop) {
        t0 = end;
        later(pass, end - 0.25);          // doplanuj kolejne okrążenie tuż przed końcem
      } else {
        later(() => { playing = false; hooks.onEnd && hooks.onEnd(); onStop = null; }, end + 0.2);
      }
    };
    pass();
  }

  return { playVoicing, playNote, playProgression, stop, setReverb,
           now() { return ctx ? ctx.currentTime : 0; },
           get playing() { return playing; } };
})();

/* === fretboard-view.js — gryf-scena: duży gryf + animowane prowadzenie głosów ===
   Warstwa brudna (SVG + requestAnimationFrame). Cała matematyka — geometria
   i pozycje w czasie — pochodzi z czystych funkcji silnika; jedynym zegarem
   animacji jest Audio.now() (AudioContext), więc obraz nie rozjeżdża się z dźwiękiem. */
const FretboardView = (() => {
  const NS = 'http://www.w3.org/2000/svg';
  const AMBER = '#e8a33c', DARK = '#1d1407';
  const reduced = !!(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches);
  const byId = (id) => document.getElementById(id);
  const fxOn = () => { const c = byId('fx'); return !c || c.checked; };

  let wrap = null, box = null, svg = null, geo = null, capCur = null;
  let voicings = null, chords = null, sched = null;
  let dotEls = [], lblEls = [], trailEls = [], baseEls = {}, glowEls = {};
  let t0 = 0, loop = false, firstPass = true, active = false, armed = null;
  let raf = 0, lastT = -1e9, lastIdx = 0, restIdx = 0;
  let strums = [], glow = {}, vib = {};
  let onIdx = null, lastHookIdx = -1;                  // subskrypcja UI: „gra akord nr i"

  const el = (n, a, parent) => {
    const e = document.createElementNS(NS, n);
    for (const k in a) e.setAttribute(k, a[k]);
    if (parent) parent.appendChild(e);
    return e;
  };

  function windowOf(vs) {
    let lo = Infinity, hi = 0;
    vs.forEach((v) => v.frets.forEach((f) => { lo = Math.min(lo, f); hi = Math.max(hi, f); }));
    return { lo, hi: Math.max(hi, lo + 3) };          // kamera stoi: okno z całego planu
  }

  function stopRaf() { if (raf) cancelAnimationFrame(raf); raf = 0; }

  function clear() {
    stopRaf(); active = false;
    voicings = null; chords = null; geo = null;
    if (!wrap) wrap = byId('fb-wrap');
    if (wrap) { wrap.innerHTML = ''; wrap.style.display = 'none'; }
  }

  function build(plan, parsedChords) {
    wrap = byId('fb-wrap');
    stopRaf(); active = false;
    voicings = plan.voicings; chords = parsedChords;
    glow = {}; vib = {}; restIdx = 0; lastIdx = 0; lastHookIdx = -1;
    const { lo, hi } = windowOf(voicings);
    geo = Engine.fretboardGeometry({ lo, hi });
    const names = Engine.TUNINGS[voicings[0].tuning].names;
    const inSet = new Set(voicings[0].strings);
    const yTop = geo.stringY(1) - 16, yBot = geo.stringY(6) + 16;

    wrap.style.display = '';
    wrap.innerHTML = '<div class="fretboard"></div>';
    box = wrap.firstChild;
    svg = el('svg', { viewBox: `0 0 ${geo.width} ${geo.height}`, role: 'img',
                      'aria-label': 'gryf z animowanym prowadzeniem głosów' });
    box.appendChild(svg);

    // podstrunnica (drewno)
    const defs = el('defs', {}, svg);
    const grad = el('linearGradient', { id: 'wood', x1: 0, y1: 0, x2: 0, y2: 1 }, defs);
    el('stop', { offset: '0%', 'stop-color': '#352a20' }, grad);
    el('stop', { offset: '55%', 'stop-color': '#2b2119' }, grad);
    el('stop', { offset: '100%', 'stop-color': '#241b14' }, grad);
    el('rect', { x: geo.x0, y: yTop, width: geo.x1 - geo.x0, height: yBot - yTop,
                 rx: 6, fill: 'url(#wood)' }, svg);

    // inlaye
    const cyMid = (geo.stringY(1) + geo.stringY(6)) / 2;
    const gap = geo.stringY(2) - geo.stringY(1);
    for (const inl of geo.inlays) {
      if (inl.double) {
        el('circle', { cx: inl.x, cy: cyMid - gap, r: 5, fill: '#efe6d8', opacity: 0.16 }, svg);
        el('circle', { cx: inl.x, cy: cyMid + gap, r: 5, fill: '#efe6d8', opacity: 0.16 }, svg);
      } else {
        el('circle', { cx: inl.x, cy: cyMid, r: 5, fill: '#efe6d8', opacity: 0.16 }, svg);
      }
    }

    // druty progów + siodełko + numery progów
    for (let f = geo.leftWire; f <= geo.rightWire; f++) {
      const nut = f === 0 && geo.hasNut;
      el('line', { x1: geo.wireXpx(f), y1: yTop, x2: geo.wireXpx(f), y2: yBot,
                   stroke: nut ? '#e6dcc6' : '#8d7d66', 'stroke-width': nut ? 7 : 2 }, svg);
    }
    const nums = geo.inlays.map((i) => i.f).concat(geo.lo > 1 ? [geo.lo] : []);
    for (const f of [...new Set(nums)]) {
      el('text', { x: geo.dotX(f), y: yBot + 15, fill: '#b3a692', 'font-size': 11,
                   'text-anchor': 'middle' }, svg).textContent = f;
    }

    // struny: poświata pod spodem + linia bazowa (obie jako path → mogą falować)
    baseEls = {}; glowEls = {};
    for (let s = 6; s >= 1; s--) {
      const y = geo.stringY(s), w = 1 + (s - 1) * 0.5;
      const d = `M ${geo.x0} ${y} Q ${(geo.x0 + geo.x1) / 2} ${y} ${geo.x1} ${y}`;
      glowEls[s] = el('path', { d, fill: 'none', stroke: AMBER, 'stroke-width': w + 1.6,
                                'stroke-linecap': 'round', opacity: 0 }, svg);
      baseEls[s] = el('path', { d, fill: 'none', stroke: inSet.has(s) ? '#d8cdb8' : '#5a4a39',
                                'stroke-width': w, 'stroke-linecap': 'round' }, svg);
      el('text', { x: 18, y: y + 4, fill: inSet.has(s) ? '#b3a692' : '#5a4a39',
                   'font-size': 12, 'text-anchor': 'middle' }, svg).textContent = names[s];
    }

    // smugi (pod kropkami) + 3 kropki-głosy + etykiety nut
    trailEls = []; dotEls = []; lblEls = [];
    for (let v = 0; v < 3; v++) {
      trailEls.push(el('line', { stroke: AMBER, 'stroke-width': 5,
                                 'stroke-linecap': 'round', opacity: 0 }, svg));
    }
    for (let v = 0; v < 3; v++) {
      dotEls.push(el('circle', { r: 9, fill: AMBER }, svg));
      lblEls.push(el('text', { fill: DARK, 'font-size': 9, 'font-weight': 700,
                               'text-anchor': 'middle' }, svg));
    }

    const cap = document.createElement('div');
    cap.className = 'cap';
    cap.innerHTML = '<span id="fb-cur"></span><span id="fb-rng"></span>';
    box.appendChild(cap);
    capCur = byId('fb-cur');
    byId('fb-rng').textContent =
      `okno progów ${geo.lo}–${geo.hi} · ${Engine.TUNINGS[voicings[0].tuning].label}`;

    applyState(settled(0));
  }

  function settled(i) {
    const v = voicings[i];
    return { chordIndex: i, nextIndex: i, inTransition: false, u: 0,
      dots: v.frets.map((f, k) => ({ voice: k, string: v.strings[k],
        fromFret: f, toFret: f, fret: f, open: f === 0 })) };
  }

  function applyState(st) {
    const idx = st.inTransition ? st.nextIndex : st.chordIndex;
    st.dots.forEach((d, v) => {
      const x = geo.dotX(d.fret), y = geo.stringY(d.string);
      const c = dotEls[v], l = lblEls[v], tr = trailEls[v];
      c.setAttribute('cx', x); c.setAttribute('cy', y);
      if (d.open) {
        c.setAttribute('r', 7); c.setAttribute('fill', 'none');
        c.setAttribute('stroke', AMBER); c.setAttribute('stroke-width', 2);
        l.setAttribute('opacity', 0);
      } else {
        c.setAttribute('r', 9); c.setAttribute('fill', AMBER); c.setAttribute('stroke', 'none');
        l.setAttribute('opacity', 1);
      }
      l.setAttribute('x', x); l.setAttribute('y', y + 3.5);
      l.textContent = voicings[idx].noteNames[v];
      if (st.inTransition && !reduced) {
        tr.setAttribute('x1', geo.dotX(d.fromFret)); tr.setAttribute('y1', y);
        tr.setAttribute('x2', x); tr.setAttribute('y2', y);
        tr.setAttribute('opacity', (0.4 * (1 - st.u)).toFixed(3));
      } else {
        tr.setAttribute('opacity', 0);
      }
    });
    lastIdx = idx;
    if (capCur && chords && chords[idx]) capCur.textContent = `${chords[idx].roman} · ${chords[idx].name}`;
    if (onIdx && idx !== lastHookIdx) { lastHookIdx = idx; onIdx(idx); }
  }

  // statyczny podgląd (hover karty) — tylko gdy nic nie gra
  function preview(i) { if (voicings && geo && !Audio.playing) applyState(settled(i)); }
  function rest() { if (voicings && geo && !Audio.playing) applyState(settled(restIdx)); }

  // uzbrojenie nowej sesji odtwarzania (przed Audio.playProgression)
  function arm(opt) { armed = opt; active = false; stopRaf(); }

  // twarde zatrzymanie animacji (np. na czas odsłuchu propozycji):
  // bez tego pętla rAF mogłaby wznowić się z nieaktualnym t0, gdy Audio.playing
  // stanie się true dla innego materiału niż plan progresji
  function halt() {
    stopRaf();
    if (!active) return;
    active = false; restIdx = lastIdx; glow = {}; vib = {};
    if (geo && voicings) { updateStrings(Audio.now()); applyState(settled(restIdx)); }
    if (box) box.style.boxShadow = '';
  }

  // wywoływane przez Audio na starcie KAŻDEGO przebiegu (pętla: tylko nowy t0)
  function start(t0Pass) {
    if (!voicings || !geo) return;
    if (active) { t0 = t0Pass; return; }
    const opt = armed || { bpm: 80, loop: false };
    active = true; firstPass = true;
    t0 = t0Pass; loop = !!opt.loop;
    // ten sam wzorzec co w audio → poświata struny dokładnie tam, gdzie strum;
    // świadomie bez humanizacji (±8 ms poniżej progu percepcji wzrokowej)
    sched = Engine.progressionSchedule(voicings, { bpm: opt.bpm, beatsPerChord: 4, pattern: opt.pattern });
    strums = sched.events.map((e, k) => ({
      time: e.time,
      string: voicings[e.chord !== undefined ? e.chord : Math.floor(k / 3)]
        .strings[e.voice !== undefined ? e.voice : k % 3],
    }));
    lastT = -1e9; glow = {}; vib = {};
    raf = requestAnimationFrame(tick);
  }

  function hit(s, nowA, withVib) { glow[s] = nowA; if (withVib) vib[s] = nowA; }
  function decaying() { return Object.keys(glow).length + Object.keys(vib).length > 0; }

  function tick() {
    raf = 0;
    if (!geo || !voicings || !sched) return;
    const nowA = Audio.now();
    const t = nowA - t0;
    if (firstPass && t >= 0) firstPass = false;
    const lp = loop && !firstPass;                     // count-in 1. przebiegu: czekaj na akordzie 0
    applyState(Engine.animState(t, voicings, sched, { loop: lp, instant: reduced }));

    // zdarzenia strum → poświata (zawsze) / wibracja (tylko Odtwórz + „efekty", bez reduced motion)
    const tc = lp ? ((t % sched.totalDuration) + sched.totalDuration) % sched.totalDuration : t;
    const withVib = !loop && !reduced && fxOn();
    if (tc >= lastT) {
      for (const s of strums) if (s.time > lastT && s.time <= tc) hit(s.string, nowA, withVib);
    } else {                                           // zawinięcie pętli
      for (const s of strums) if (s.time > lastT || s.time <= tc) hit(s.string, nowA, withVib);
    }
    lastT = tc;

    updateStrings(nowA);
    pulse(tc);

    if (Audio.playing || decaying()) {
      raf = requestAnimationFrame(tick);
    } else {                                           // wygaszenie: zatrzaśnij stan spoczynkowy
      active = false; restIdx = lastIdx;
      glow = {}; vib = {};
      updateStrings(nowA);
      if (box) box.style.boxShadow = '';
      applyState(settled(restIdx));
    }
  }

  function updateStrings(nowA) {
    const xm = (geo.x0 + geo.x1) / 2;
    for (let s = 1; s <= 6; s++) {
      const y = geo.stringY(s);
      let off = 0;
      if (vib[s] !== undefined) {
        const tau = nowA - vib[s];
        if (tau < 0.45) off = 9 * Math.sin(2 * Math.PI * 9 * tau) * Math.exp(-tau / 0.12);
        else delete vib[s];
      }
      const d = `M ${geo.x0} ${y} Q ${xm} ${(y + off).toFixed(2)} ${geo.x1} ${y}`;
      baseEls[s].setAttribute('d', d);
      glowEls[s].setAttribute('d', d);
      let op = 0;
      if (glow[s] !== undefined) {
        const tau = nowA - glow[s];
        if (tau < 0.5) op = 0.8 * Math.exp(-tau / 0.16);
        else delete glow[s];
      }
      glowEls[s].setAttribute('opacity', op.toFixed(3));
    }
  }

  // żar lampy oddychający z taktem (akcent na „raz")
  function pulse(tc) {
    if (!box) return;
    if (reduced || !fxOn() || !Audio.playing || tc < 0 || !sched) { box.style.boxShadow = ''; return; }
    const tau = tc % (4 * sched.beat);
    const k = Math.exp(-tau / 0.18);
    box.style.boxShadow = `0 0 ${Math.round(28 * k)}px rgba(232, 163, 60, ${(0.28 * k).toFixed(3)})`;
  }

  return { build, clear, arm, start, preview, rest, halt,
           setOnIdx(cb) { onIdx = cb; } };
})();

/* === fretboard-explorer.js — gryf jako instrument (zakładka Gryf) ===
   Warstwa brudna (SVG + zdarzenia klików). Cała matematyka pochodzi z silnika:
   geo.hitTest mapuje piksel → (struna, próg), recognizeTriad nazywa zaznaczone
   dźwięki. Selekcja: jeden dźwięk na strunę, maks. 3 (czwarty klik wypycha
   najstarszy — FIFO sprzyja eksploracji), klik w zaznaczone pole odznacza. */
const FretboardExplorer = (() => {
  const NS = 'http://www.w3.org/2000/svg';
  const AMBER = '#e8a33c', DARK = '#1d1407';
  const FALLBACK_NAMES = ['C', 'C♯', 'D', 'E♭', 'E', 'F', 'F♯', 'G', 'A♭', 'A', 'B♭', 'B'];
  const QUAL_PL = { maj: 'dur', min: 'moll', dim: 'zmniejszona', aug: 'zwiększona' };
  const byId = (id) => document.getElementById(id);
  const el = (n, a, parent) => {
    const e = document.createElementNS(NS, n);
    for (const k in a) e.setAttribute(k, a[k]);
    if (parent) parent.appendChild(e);
    return e;
  };

  let geo = null, svg = null, selLayer = null;
  let sel = [];                                        // [{string, fret}] w kolejności klikania

  const openMidi = () => Engine.TUNINGS[state.tuning].open;
  const midiOf = (n) => openMidi()[n.string] + n.fret;
  const sortedMidis = () => sel.map(midiOf).sort((a, b) => a - b);

  function windowRange() {
    const lo = Math.max(0, state.fmin);
    return { lo, hi: Math.max(state.fmax, lo + 4) };
  }

  function rebuild() {
    const box = byId('ex-board');
    if (!box) return;
    box.innerHTML = '';
    geo = Engine.fretboardGeometry(windowRange());
    const names = Engine.TUNINGS[state.tuning].names;
    const yTop = geo.stringY(1) - 16, yBot = geo.stringY(6) + 16;
    svg = el('svg', { viewBox: `0 0 ${geo.width} ${geo.height}`, role: 'img',
                      'aria-label': 'klikalny gryf — zaznacz trzy dźwięki, żeby rozpoznać triadę' });

    const defs = el('defs', {}, svg);
    const grad = el('linearGradient', { id: 'wood-ex', x1: 0, y1: 0, x2: 0, y2: 1 }, defs);
    el('stop', { offset: '0%', 'stop-color': '#352a20' }, grad);
    el('stop', { offset: '55%', 'stop-color': '#2b2119' }, grad);
    el('stop', { offset: '100%', 'stop-color': '#241b14' }, grad);
    el('rect', { x: geo.x0, y: yTop, width: geo.x1 - geo.x0, height: yBot - yTop,
                 rx: 6, fill: 'url(#wood-ex)' }, svg);

    const cyMid = (geo.stringY(1) + geo.stringY(6)) / 2;
    const gap = geo.stringY(2) - geo.stringY(1);
    for (const inl of geo.inlays) {
      if (inl.double) {
        el('circle', { cx: inl.x, cy: cyMid - gap, r: 5, fill: '#efe6d8', opacity: 0.16 }, svg);
        el('circle', { cx: inl.x, cy: cyMid + gap, r: 5, fill: '#efe6d8', opacity: 0.16 }, svg);
      } else {
        el('circle', { cx: inl.x, cy: cyMid, r: 5, fill: '#efe6d8', opacity: 0.16 }, svg);
      }
    }
    for (let f = geo.leftWire; f <= geo.rightWire; f++) {
      const nut = f === 0 && geo.hasNut;
      el('line', { x1: geo.wireXpx(f), y1: yTop, x2: geo.wireXpx(f), y2: yBot,
                   stroke: nut ? '#e6dcc6' : '#8d7d66', 'stroke-width': nut ? 7 : 2 }, svg);
    }
    const nums = geo.inlays.map((i) => i.f).concat(geo.lo > 1 ? [geo.lo] : []);
    for (const f of [...new Set(nums)]) {
      el('text', { x: geo.dotX(f), y: yBot + 15, fill: '#b3a692', 'font-size': 11,
                   'text-anchor': 'middle' }, svg).textContent = f;
    }
    for (let s = 6; s >= 1; s--) {
      const y = geo.stringY(s), w = 1 + (s - 1) * 0.5;
      el('line', { x1: geo.x0, y1: y, x2: geo.x1, y2: y, stroke: '#d8cdb8',
                   'stroke-width': w, 'stroke-linecap': 'round' }, svg);
      el('text', { x: 18, y: y + 4, fill: '#b3a692', 'font-size': 12,
                   'text-anchor': 'middle' }, svg).textContent = names[s];
    }

    if (byId('ex-scale').checked) drawScaleOverlay();
    selLayer = el('g', {}, svg);
    svg.addEventListener('click', onClick);
    box.appendChild(svg);

    // okno/strój mogły się zmienić — wytnij dźwięki spoza nowego okna
    sel = sel.filter((n) => (n.fret === 0 ? geo.hasNut
      : n.fret > geo.leftWire && n.fret <= geo.rightWire));
    update();
  }

  // nakładka skali: kropki-duchy dźwięków diatonicznych, tonika jako pierścień
  function drawScaleOverlay() {
    const sc = Engine.spellScale(state.key, state.scale);
    if (!sc) return;
    const pcSet = new Set(sc.map((n) => n.pc));
    const tonicPc = sc[0].pc;
    const open = openMidi();
    const fLo = geo.hasNut ? 0 : geo.leftWire + 1;
    for (let s = 1; s <= 6; s++) {
      for (let f = fLo; f <= geo.rightWire; f++) {
        const pc = Engine.mod12(open[s] + f);
        if (!pcSet.has(pc)) continue;
        const x = geo.dotX(f), y = geo.stringY(s);
        if (pc === tonicPc) {
          el('circle', { cx: x, cy: y, r: 5.5, fill: 'none', stroke: AMBER,
                         'stroke-width': 1.6, opacity: 0.55 }, svg);
        } else {
          el('circle', { cx: x, cy: y, r: 3.4, fill: '#efe6d8', opacity: 0.22 }, svg);
        }
      }
    }
  }

  function onClick(ev) {
    const r = svg.getBoundingClientRect();
    if (!r.width || !r.height) return;
    const hit = geo.hitTest(((ev.clientX - r.left) / r.width) * geo.width,
                            ((ev.clientY - r.top) / r.height) * geo.height);
    if (hit) select(hit);
  }

  // API także programistyczne (smoke testy): zaznacz/odznacz pole
  function select(hit) {
    const same = sel.findIndex((n) => n.string === hit.string && n.fret === hit.fret);
    if (same >= 0) sel.splice(same, 1);                // to samo pole → odznacz
    else {
      const onString = sel.findIndex((n) => n.string === hit.string);
      if (onString >= 0) sel.splice(onString, 1);      // struna gra jeden dźwięk
      sel.push(hit);
      while (sel.length > 3) sel.shift();              // FIFO
      try { Audio.playNote(midiOf(hit)); } catch (e) { /* brak Web Audio (np. testy) */ }
    }
    update();
  }

  function clear() { sel = []; update(); }
  function playSelection() {
    if (sel.length) Audio.playVoicing({ midis: sortedMidis() });
  }

  function update() {
    const res = sel.length === 3
      ? Engine.recognizeTriad(sortedMidis(), { key: state.key, scale: state.scale })
      : null;
    drawSelection(res);
    renderResult(res);
  }

  function pcName(res) {
    const map = {};
    if (res && res.ok) {
      res.noteNames.forEach((nm, i) => { map[Engine.mod12(res.midis[i])] = nm; });
    } else {
      const sc = Engine.spellScale(state.key, state.scale);
      if (sc) for (const n of sc) map[n.pc] = n.name;
    }
    return (pc) => map[pc] || FALLBACK_NAMES[pc];
  }

  function drawSelection(res) {
    if (!selLayer) return;
    while (selLayer.firstChild) selLayer.removeChild(selLayer.firstChild);
    const nameOf = pcName(res);
    for (const n of sel) {
      const x = geo.dotX(n.fret), y = geo.stringY(n.string);
      if (n.fret === 0) {
        el('circle', { cx: x, cy: y, r: 7, fill: 'none', stroke: AMBER, 'stroke-width': 2 }, selLayer);
      } else {
        const pc = Engine.mod12(midiOf(n));
        el('circle', { cx: x, cy: y, r: 9, fill: AMBER }, selLayer);
        el('text', { x, y: y + 3.5, fill: DARK, 'font-size': 9, 'font-weight': 700,
                     'text-anchor': 'middle' }, selLayer).textContent = nameOf(pc);
      }
    }
  }

  function renderResult(res) {
    const out = byId('ex-result'), hint = byId('ex-hint');
    out.innerHTML = '';
    byId('ex-play').disabled = sel.length === 0;
    byId('ex-clear').disabled = sel.length === 0;
    if (sel.length < 3) {
      const left = 3 - sel.length;
      hint.textContent = sel.length === 0
        ? 'Klikaj pola na gryfie (także struny puste przed siodełkiem) — trzy dźwięki na trzech strunach, a powiem Ci, co to za triada.'
        : `Jeszcze ${left === 1 ? 'jeden dźwięk' : left + ' dźwięki'}… (czwarty klik wypycha najstarszy, klik w zaznaczone pole odznacza)`;
      return;
    }
