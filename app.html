    if (!res.ok) { hint.textContent = res.reason; return; }
    hint.textContent = '';
    const card = document.createElement('div');
    card.className = 'card ex-card';
    card.innerHTML = `
      <div class="row">
        <div><h3>${res.slashName}</h3>
          <div class="sub">triada ${QUAL_PL[res.quality]} · ${res.inversionName}</div></div>
        <span class="ex-badge${res.diatonic ? '' : ' borrow'}">${res.roman}${res.diatonic ? '' : ' · zapożyczenie'}</span>
      </div>
      <div class="notes">bas→sopran: <b>${res.noteNames.join(' – ')}</b></div>
      <div class="notes">${res.diatonic
        ? `stopień <b>${res.roman}</b> w tonacji ${state.key} (${Engine.scaleLabel(state.scale)})`
        : `spoza skali ${state.key} (${Engine.scaleLabel(state.scale)})`}</div>
      <div class="ex-actions">
        <button class="btn ex-strum">▶ Zagraj</button>
        <button class="btn primary ex-add">Dopisz ${res.roman} do progresji</button>
      </div>`;
    card.querySelector('.ex-strum').addEventListener('click', () =>
      Audio.playVoicing({ midis: res.midis }));
    card.querySelector('.ex-add').addEventListener('click', () => {
      const inp = $('#progtext');
      inp.value = inp.value.trim() ? inp.value.trim() + '-' + res.roman : res.roman;
      generate();
      toast(`Dodano ${res.roman} · ${res.chord.name} do progresji`);
    });
    out.appendChild(card);
  }

  return { rebuild, select, clear, playSelection };
})();
window.FretboardExplorer = FretboardExplorer;          // dostęp programistyczny (smoke testy)

/* === ui.js === */
const $ = (s) => document.querySelector(s);
const KEYS = ['C', 'G', 'D', 'A', 'E', 'B', 'F#', 'Db', 'Ab', 'Eb', 'Bb', 'F'];

const state = {
  tuning: 'standard',
  key: 'C', scale: 'major', set: '321', inv: 'all',
  fmin: 0, fmax: 12,
  croot: 'C', cqual: 'maj',
  selDegree: 0,
  pattern: 'whole',           // wzorzec rytmiczny odtwarzania
  plan: null,                 // wynik planProgression
  planChords: null,
};

function opts() { return { minFret: state.fmin, maxFret: state.fmax, inversionFilter: state.inv, tuning: state.tuning }; }
function tNames(v) { return Engine.TUNINGS[(v && v.tuning) || state.tuning].names; }

/* — diagram gryfu (SVG): 6 strun pionowo, okno 5 progów, bursztynowe kropki — */
function diagramSVG(v) {
  const lo = Math.min(...v.frets), hi = Math.max(...v.frets);
  const start = lo <= 1 ? 0 : lo - 1;
  const rows = Math.max(5, hi - start);          // okno mieści całą rozpiętość
  const W = 120, H = 132, left = 18, top = 22, sw = (W - 2 * left) / 5, fh = (H - top - 10) / rows;
  const used = Object.fromEntries(v.strings.map((s, i) => [s, i]));
  let g = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" role="img" aria-label="diagram chwytu">`;
  // progi
  for (let f = 0; f <= rows; f++) {
    const y = top + f * fh;
    g += `<line x1="${left}" y1="${y}" x2="${W - left}" y2="${y}" stroke="#3b2f25" stroke-width="${f === 0 && start === 0 ? 4 : 1}"/>`;
  }
  if (start > 0) g += `<text x="${left - 6}" y="${top + fh * 0.65}" fill="#b3a692" font-size="10" text-anchor="end">${start + 1}</text>`;
  // struny (6 z lewej → 1 z prawej)
  for (let s = 6; s >= 1; s--) {
    const x = left + (6 - s) * sw;
    const inSet = s in used;
    g += `<line x1="${x}" y1="${top}" x2="${x}" y2="${H - 10}" stroke="${inSet ? '#efe6d8' : '#4a3c2f'}" stroke-width="1"/>`;
    g += `<text x="${x}" y="${12}" fill="${inSet ? '#b3a692' : '#4a3c2f'}" font-size="9" text-anchor="middle">${tNames(v)[s]}</text>`;
  }
  // kropki
  v.strings.forEach((s, i) => {
    const x = left + (6 - s) * sw;
    const f = v.frets[i];
    if (f === 0) {
      g += `<circle cx="${x}" cy="${top - 5}" r="3.4" fill="none" stroke="#e8a33c" stroke-width="1.4"/>`;
    } else {
      const y = top + (f - start - 0.5) * fh;
      g += `<circle cx="${x}" cy="${y}" r="6.5" fill="#e8a33c"/>`;
      g += `<text x="${x}" y="${y + 3}" fill="#1d1407" font-size="8.5" font-weight="700" text-anchor="middle">${f}</text>`;
    }
  });
  return g + '</svg>';
}

function tabText(v) {
  const nm = tNames(v);
  return [1, 2, 3, 4, 5, 6].map((s) => {
    const i = v.strings.indexOf(s);
    const cell = i >= 0 ? String(v.frets[i]) : '-';
    return `${nm[s]}|—${cell.padEnd(2, '—')}—|`;
  }).join('\n');
}

function voicingCard(v, title) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="row">
      <div><h3>${title}</h3><div class="sub">${v.inversionName} · śr. próg ${v.position.toFixed(1)}</div></div>
      <button class="play" title="Odtwórz" aria-label="Odtwórz ${title}">▶</button>
    </div>
    ${diagramSVG(v)}
    <div class="tabtxt">${tabText(v)}</div>
    <div class="notes">bas→sopran: <b>${v.noteNames.join(' – ')}</b></div>`;
  const btn = card.querySelector('.play');
  btn.addEventListener('click', () => {
    btn.classList.add('lit'); card.classList.add('playing');
    Audio.playVoicing(v, () => { btn.classList.remove('lit'); card.classList.remove('playing'); });
  });
  return card;
}

/* — zakładka Akord — */
function renderChordTab() {
  const ch = Engine.buildChord(state.croot, state.cqual);
  const box = $('#chord-cards');
  box.innerHTML = '';
  const vs = Engine.voicingsForChord(ch, state.set, opts());
  if (!vs.length) { box.innerHTML = `<p class="error">Brak voicingów w zadanym zakresie progów — poszerz zakres.</p>`; return; }
  vs.forEach((v) => box.appendChild(voicingCard(v, ch.name)));
}

/* — zakładka Diatonika — */
function renderDiatonics() {
  const tri = Engine.diatonicTriads(state.key, state.scale);
  const box = $('#dia-degrees');
  box.innerHTML = '';
  tri.forEach((c, i) => {
    const b = document.createElement('button');
    b.className = 'deg' + (i === state.selDegree ? ' sel' : '');
    b.innerHTML = `<div class="roman">${c.roman}</div><div class="nm">${c.name}</div><div class="ns">${c.names.join(' ')}</div>`;
    b.addEventListener('click', () => { state.selDegree = i; renderDiatonics(); });
    b.addEventListener('dblclick', () => {
      const inp = $('#progtext');
      inp.value = inp.value.trim() ? inp.value.trim() + '-' + c.roman : c.roman;
      updateSuggestions();
      toast(`Dodano ${c.roman} do progresji`);
    });
    box.appendChild(b);
  });
  const cards = $('#dia-cards');
  cards.innerHTML = '';
  const sel = tri[state.selDegree];
  Engine.voicingsForChord(sel, state.set, opts()).forEach((v) => cards.appendChild(voicingCard(v, sel.name)));
}

/* — zakładka Progresja — */
function generate() {
  const out = $('#prog-out');
  out.innerHTML = '';
  const parsed = Engine.parseProgression($('#progtext').value, state.key);
  if (!parsed.ok) { out.innerHTML = `<p class="error">${parsed.error}</p>`; state.plan = null; FretboardView.clear(); if (stageOn) stageInfoReset(); updateSuggestions(); return; }
  const plan = Engine.planProgression(parsed.chords, state.set, opts());
  if (!plan.ok) {
    out.innerHTML = `<p class="error">Brak voicingów dla akordu <b>${plan.chord.name}</b> (stopień ${parsed.chords[plan.failedIndex].roman}) w progach ${state.fmin}–${state.fmax}. Poszerz zakres progów.</p>`;
    state.plan = null; FretboardView.clear(); if (stageOn) stageInfoReset(); updateSuggestions(); return;
  }
  if (Audio.playing) { Audio.stop(); }                 // nowy plan = nowa scena
  state.plan = plan; state.planChords = parsed.chords;
  FretboardView.build(plan, parsed.chords);
  if (stageOn) stageProgText();
  syncHashIfLive();

  const flow = document.createElement('div');
  flow.className = 'flow';
  plan.voicings.forEach((v, i) => {
    const c = voicingCard(v, `${parsed.chords[i].roman} · ${parsed.chords[i].name}`);
    c.dataset.idx = i;
    c.addEventListener('mouseenter', () => FretboardView.preview(i));
    c.addEventListener('mouseleave', () => FretboardView.rest());
    flow.appendChild(c);
    if (i < plan.voicings.length - 1) {
      const a = document.createElement('div'); a.className = 'arrow'; a.textContent = '→';
      flow.appendChild(a);
    }
  });
  out.appendChild(flow);
  const cost = document.createElement('p');
  cost.className = 'cost';
  cost.textContent = `Łączny koszt prowadzenia głosów: ${plan.totalCost.toFixed(1)} (suma ruchów progów + kara za skoki pozycji).`;
  out.appendChild(cost);

  const pre = document.createElement('pre');
  pre.className = 'tabtxt fulltab';
  pre.textContent = fullTab(plan.voicings, parsed.chords);
  out.appendChild(pre);
  updateSuggestions();
}

function fullTab(voicings, chords) {
  const head = '   ' + chords.map((c) => c.name.padEnd(6)).join('');
  const nm = tNames(voicings[0]);
  const lines = [1, 2, 3, 4, 5, 6].map((s) => {
    let line = nm[s] + '|—';
    for (const v of voicings) {
      const i = v.strings.indexOf(s);
      line += (i >= 0 ? String(v.frets[i]) : '—').padEnd(4, '—') + '——';
    }
    return line + '|';
  });
  return head + '\n' + lines.join('\n');
}

/* — propozycje „co dalej?” — */
function updateSuggestions() {
  const row = $('#suggest-row');
  row.querySelectorAll('.schip').forEach((c) => c.remove());
  const text = $('#progtext').value.trim();
  let chords = [];
  if (text) {
    const parsed = Engine.parseProgression(text, state.key);
    if (!parsed.ok) { row.hidden = true; return; }     // niedokończony token = brak podpowiedzi
    chords = parsed.chords;
  }
  // skala z kontrolek steruje rankingiem (diatonika skali); przy konflikcie
  // z trybem progresji silnik sam wraca do czystej heurystyki
  const sugg = Engine.suggestNext(chords, state.key, { limit: 3, scale: state.scale });
  row.hidden = !sugg.length;
  for (const s of sugg) row.appendChild(suggestionChip(s));
}

function suggestionChip(s) {
  const chip = document.createElement('div');
  chip.className = 'schip';
  chip.title = s.reasons.join(' · ');
  const add = document.createElement('button');
  add.className = 'schip-add';
  add.innerHTML = `<code>${s.roman}</code> · <b>${s.chord.name}</b>`;
  add.setAttribute('aria-label', `Dopisz ${s.roman} (${s.chord.name}) do progresji`);
  add.addEventListener('click', () => {
    const inp = $('#progtext');
    inp.value = inp.value.trim() ? inp.value.trim() + '-' + s.roman : s.roman;
    generate();
    toast(`Dodano ${s.roman} · ${s.chord.name}`);
  });
  const play = document.createElement('button');
  play.className = 'schip-play';
  play.textContent = '▶';
  play.title = 'Posłuchaj przejścia: ostatni akord → propozycja';
  play.setAttribute('aria-label', `Posłuchaj przejścia do ${s.chord.name}`);
  play.addEventListener('click', () => previewSuggestion(s, play));
  chip.append(add, play);
  return chip;
}

function previewSuggestion(s, btn) {
  const candVs = Engine.voicingsForChord(s.chord, state.set, opts());
  if (!candVs.length) {
    toast(`Brak voicingów dla ${s.chord.name} w progach ${state.fmin}–${state.fmax}`);
    return;
  }
  Audio.stop(); FretboardView.halt();
  document.querySelectorAll('.schip-play.lit').forEach((b) => b.classList.remove('lit'));
  btn.classList.add('lit');
  const unlit = () => btn.classList.remove('lit');
  const last = state.plan && state.plan.voicings[state.plan.voicings.length - 1];
  if (!last) { Audio.playVoicing(candVs[0], unlit); return; }   // pusta progresja: sam kandydat
  let cand = candVs[0], best = Infinity;               // voicing najbliższy ostatniemu (minimalny ruch)
  for (const v of candVs) {
    const c = Engine.transitionCost(last, v);
    if (c < best) { best = c; cand = v; }
  }
  Audio.playProgression([last, cand],
    { bpm: Number($('#bpm').value), beatsPerChord: 2, metronome: false, countIn: false, loop: false },
    { onChord() {}, onEnd: unlit, onStart() {} });
}

/* — transport — */
function highlight(i) {
  document.querySelectorAll('#prog-out .card').forEach((c) =>
    c.classList.toggle('playing', Number(c.dataset.idx) === i));
}
function transportIdle() {
  $('#stop').disabled = true; $('#play').disabled = false; $('#practice').disabled = false;
  highlight(-1);
}
let lastLoop = false;                                  // tryb ostatniej sesji (restart po zmianie rytmu)
function startPlayback(loop) {
  if (!state.plan) generate();
  if (!state.plan) return;
  lastLoop = loop;
  Audio.stop();
  $('#stop').disabled = false; $('#play').disabled = true; $('#practice').disabled = true;
  FretboardView.arm({ bpm: Number($('#bpm').value), loop, pattern: state.pattern });
  Audio.playProgression(state.plan.voicings, {
    bpm: Number($('#bpm').value), beatsPerChord: 4,
    metronome: $('#metro').checked, countIn: $('#countin').checked, loop,
    pattern: state.pattern,
    humanizeSeed: (Math.random() * 0x7fffffff) | 0,    // silnik deterministyczny per seed; seed losowy per sesja
  }, { onChord: highlight, onEnd: transportIdle, onStart: (t0) => FretboardView.start(t0) });
}

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}

function showPane(id) {
  document.querySelectorAll('.tab').forEach((x) => x.classList.toggle('active', x.dataset.pane === id));
  document.querySelectorAll('.pane').forEach((p) => p.classList.toggle('active', p.id === id));
}

/* — Tryb Sceny — */
// Pełnoekranowy widok do grania i prezentacji. Zero duplikacji stanu:
// gryf-scena i transport to te same węzły DOM, przenoszone appendChildem;
// typografię akordu napędza hak FretboardView.setOnIdx (jedno źródło prawdy
// o tym, „co teraz gra" — to samo, które ustawia podpis pod gryfem).
let stageOn = false;
let lastChordIdx = 0;
FretboardView.setOnIdx((i) => { lastChordIdx = i; if (stageOn) stageChord(i); });

function stageChord(idx) {
  const ch = state.planChords;
  if (!ch || !ch[idx]) return;
  $('#stage-roman').textContent = ch[idx].roman;
  $('#stage-name').textContent = ch[idx].name;
  if (ch.length > 1) {
    const nx = ch[(idx + 1) % ch.length];
    $('#stage-next').innerHTML = `następny → <b>${nx.roman} · ${nx.name}</b>`;
  } else {
    $('#stage-next').textContent = '';
  }
  $('#stage-count').textContent = `akord ${idx + 1} / ${ch.length}`;
}
function stageProgText() {
  $('#stage-prog').textContent = state.planChords
    ? state.planChords.map((c) => c.roman).join(' – ') : '';
}
function stageInfoReset() {
  $('#stage-roman').textContent = '—'; $('#stage-name').textContent = '';
  $('#stage-next').textContent = ''; $('#stage-count').textContent = '';
  $('#stage-prog').textContent = '';
}
function syncFx() { $('#stage').classList.toggle('fx', $('#fx').checked); }
function enterStage() {
  if (!state.plan) generate();
  if (!state.plan) { toast('Najpierw wpisz poprawną progresję'); return; }
  stageOn = true;
  document.body.classList.add('stage-on');
  $('#stage').setAttribute('aria-hidden', 'false');
  $('#stage-fb').appendChild($('#fb-wrap'));
  $('#stage-dock').appendChild(document.querySelector('.transport'));
  syncFx(); stageProgText(); stageChord(lastChordIdx);
}
function exitStage() {
  if (!stageOn) return;
  stageOn = false;
  document.body.classList.remove('stage-on');
  $('#stage').setAttribute('aria-hidden', 'true');
  $('#fb-home').appendChild($('#fb-wrap'));
  $('#transport-home').appendChild(document.querySelector('.transport'));
}

/* — link do udostępniania (stan ⇄ fragment URL, silnik: share-state.js) — */
function currentShare() {
  return { tuning: state.tuning, key: state.key, scale: state.scale, set: state.set,
           inv: state.inv, fmin: state.fmin, fmax: state.fmax,
           prog: $('#progtext').value.trim(), bpm: Number($('#bpm').value),
           pattern: state.pattern, stage: stageOn };
}
function syncHash() {
  try { history.replaceState(null, '', '#' + Engine.encodeShareState(currentShare())); }
  catch (e) { /* brak history API w danym kontekście — „Kopiuj link" i tak zadziała */ }
}
// pasek adresu żyje tylko w sesjach otwartych z linka; czysty URL zostaje czysty
function syncHashIfLive() { if (location.hash) syncHash(); }
function fallbackCopy(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); done(); }
  catch (e) { toast('Skopiuj link z paska adresu'); }
  ta.remove();
}
function copyLink() {
  syncHash();
  const url = location.href;
  const done = () => toast('Link skopiowany — otwiera dokładnie tę progresję');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(done, () => fallbackCopy(url, done));
  } else {
    fallbackCopy(url, done);
  }
}
function applySharedState() {
  const dec = Engine.decodeShareState(location.hash).state;
  if (dec.tuning) state.tuning = dec.tuning;
  if (dec.key && KEYS.indexOf(dec.key) >= 0) state.key = dec.key;   // tylko tonacje z selecta
  if (dec.scale) state.scale = dec.scale;
  if (dec.set) state.set = dec.set;
  if (dec.inv) state.inv = dec.inv;
  if (dec.pattern) state.pattern = dec.pattern;
  if (dec.fmin !== undefined) { state.fmin = dec.fmin; state.fmax = dec.fmax; }
  return dec;
}

/* — inicjalizacja — */
function fillSelect(sel, items, val) {
  sel.innerHTML = items.map(([v, l]) => `<option value="${v}">${l}</option>`).join('');
  sel.value = val;
}
function setLabels() {
  const nm = Engine.TUNINGS[state.tuning].names;
  return Object.entries(Engine.STRING_SETS).map(([k, strs]) =>
    [k, `${strs.join('\u2011')} (${strs.map((s) => nm[s]).join(' ')})`]);
}
function init() {
  const shared = applySharedState();                   // stan z linka NAD domyślnymi (zwalidowany)
  fillSelect($('#tuning'), Object.entries(Engine.TUNINGS).map(([k, t]) => [k, t.label]), state.tuning);
  fillSelect($('#set'), setLabels(), state.set);
  fillSelect($('#key'), KEYS.map((k) => [k, k]), state.key);
  fillSelect($('#scale'), Object.keys(Engine.SCALE_STEPS).map((k) => [k, Engine.scaleLabel(k)]), state.scale);
  fillSelect($('#croot'), KEYS.map((k) => [k, k]), state.croot);
  fillSelect($('#pattern'), Object.entries(Engine.PATTERNS).map(([k, p]) => [k, p.label]), state.pattern);
  Audio.setReverb($('#reverb').checked);               // tylko preferencja — AudioContext powstaje przy 1. dźwięku
  $('#inv').value = state.inv;
  $('#fmin').value = state.fmin; $('#fmax').value = state.fmax;
  if (shared.bpm) { $('#bpm').value = shared.bpm; $('#bpmval').textContent = shared.bpm + ' BPM'; }
  if (shared.prog) { $('#progtext').value = shared.prog; showPane('pane-prog'); }

  const presets = $('#presets');
  Engine.PRESETS.forEach((p) => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.innerHTML = `${p.name} <code>${p.text}</code>`;
    b.addEventListener('click', () => { $('#progtext').value = p.text; generate(); });
    presets.appendChild(b);
  });

  document.querySelectorAll('.tab').forEach((t) => t.addEventListener('click', () => showPane(t.dataset.pane)));

  const rerender = () => { renderChordTab(); renderDiatonics(); FretboardExplorer.rebuild(); if (state.plan) generate(); else updateSuggestions(); };
  $('#tuning').addEventListener('change', (e) => {
    state.tuning = e.target.value;
    fillSelect($('#set'), setLabels(), state.set);
    rerender();
  });
  $('#key').addEventListener('change', (e) => { state.key = e.target.value; rerender(); });
  $('#scale').addEventListener('change', (e) => { state.scale = e.target.value; renderDiatonics(); FretboardExplorer.rebuild(); updateSuggestions(); });
  $('#set').addEventListener('change', (e) => { state.set = e.target.value; rerender(); });
  $('#inv').addEventListener('change', (e) => { state.inv = e.target.value; rerender(); });
  $('#fmin').addEventListener('change', (e) => { state.fmin = Math.max(0, Number(e.target.value) || 0); rerender(); });
  $('#fmax').addEventListener('change', (e) => { state.fmax = Math.max(state.fmin, Number(e.target.value) || 12); rerender(); });
  $('#croot').addEventListener('change', (e) => { state.croot = e.target.value; renderChordTab(); });
  $('#cqual').addEventListener('change', (e) => { state.cqual = e.target.value; renderChordTab(); });

  $('#gen').addEventListener('click', generate);
  $('#progtext').addEventListener('keydown', (e) => { if (e.key === 'Enter') generate(); });
  let suggTimer = 0;
  $('#progtext').addEventListener('input', () => {
    clearTimeout(suggTimer);
    suggTimer = setTimeout(updateSuggestions, 250);    // propozycje na żywo podczas wpisywania
  });
  $('#bpm').addEventListener('input', (e) => { $('#bpmval').textContent = e.target.value + ' BPM'; });
  $('#pattern').addEventListener('change', (e) => {
    state.pattern = e.target.value;
    syncHashIfLive();
    // sesja transportu w toku (Stop aktywny) → restart w tym samym trybie,
    // żeby zmiana rytmu była słyszalna od razu (ważne na scenie)
    if (Audio.playing && !$('#stop').disabled) startPlayback(lastLoop);
  });
  $('#reverb').addEventListener('change', (e) => Audio.setReverb(e.target.checked));
  $('#bpm').addEventListener('change', () => {       // „żywe tempo": puszczenie suwaka
    syncHashIfLive();                                 // restartuje grającą sesję w nowym BPM
    if (Audio.playing && !$('#stop').disabled) startPlayback(lastLoop);
  });
  $('#ex-scale').addEventListener('change', FretboardExplorer.rebuild);
  $('#ex-play').addEventListener('click', FretboardExplorer.playSelection);
  $('#ex-clear').addEventListener('click', FretboardExplorer.clear);
  $('#play').addEventListener('click', () => startPlayback(false));
  $('#practice').addEventListener('click', () => startPlayback(true));
  $('#stop').addEventListener('click', () => { Audio.stop(); transportIdle(); });
  $('#copy').addEventListener('click', () => {
    if (!state.plan) generate();
    if (!state.plan) return;
    navigator.clipboard.writeText(fullTab(state.plan.voicings, state.planChords))
      .then(() => toast('Tabulatura skopiowana'));
  });
  $('#share').addEventListener('click', copyLink);
  $('#stagebtn').addEventListener('click', enterStage);
  $('#stage-exit').addEventListener('click', exitStage);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && stageOn) exitStage(); });
  $('#fx').addEventListener('change', syncFx);

  renderChordTab();
  renderDiatonics();
  FretboardExplorer.rebuild();
  generate();
  if (shared.stage && state.plan) enterStage();        // link z trybem sceny: od razu na scenę
}
init();
</script>
</body>
</html>
